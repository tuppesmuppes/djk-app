<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Volleyball Aufstellungen</title>
  <style>
    :root{ --bg:#f5f5f5; --card:#fff; --red:#CC0000; --blue:#1565c0; --line:rgba(0,0,0,.12); --muted:#888; }
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{ font-family:system-ui,sans-serif; background:var(--bg); color:#111; }
    .wrap{ max-width:1300px; margin:0 auto; padding:12px; display:grid; grid-template-columns:1.2fr .8fr; gap:14px; align-items:start; }
    @media(max-width:900px){ .wrap{ grid-template-columns:1fr; } }

    /* Cards */
    .card{ background:var(--card); border-radius:16px; box-shadow:0 8px 20px rgba(0,0,0,.07); padding:12px; border:1px solid var(--line); }

    /* Header */
    .app-title{ font-size:22px; font-weight:900; margin-bottom:2px; }
    .app-title span{ color:var(--red); }
    .current-laufer{ font-size:20px; font-weight:900; color:var(--red); min-height:26px; margin-top:2px; }
    .subtitle{ font-size:12px; color:var(--muted); margin-top:2px; }

    /* Court */
    .court{ position:relative; width:100%; border-radius:6px; border:6px solid var(--blue); overflow:hidden; background:linear-gradient(180deg,#f0f8ff,#f5f5f5); touch-action:none; user-select:none; }
    .court.interactive{ height:min(44vh,500px); }
    .court.display{ height:min(44vh,500px); margin-top:10px; }
    @media(max-width:900px){ .court.interactive,.court.display{ height:40vh; } }
    .net-grid{ position:absolute; top:0; left:0; right:0; height:16px; z-index:2; pointer-events:none;
      background-image:repeating-linear-gradient(90deg,var(--blue) 0,var(--blue) 4px,transparent 4px,transparent 14px),
        repeating-linear-gradient(0deg,var(--blue) 0,var(--blue) 3px,transparent 3px,transparent 9px);
      border-bottom:2px solid var(--blue); }
    .three-m{ position:absolute; left:0; right:0; height:5px; background:var(--blue); pointer-events:none; top:33.333%; z-index:1; }
    .three-m-lbl{ position:absolute; right:5px; font-size:10px; font-weight:800; color:var(--blue); top:calc(33.333% + 4px); pointer-events:none; }
    .zones{ position:absolute; inset:0; pointer-events:none; }
    .zone-line-v{ position:absolute; top:0; bottom:0; width:1px; background:rgba(0,0,0,.07); }
    .zone-line-h{ position:absolute; left:0; right:0; height:1px; background:rgba(0,0,0,.07); top:50%; }
    .zone-num{ position:absolute; font-size:min(3vw,24px); font-weight:900; color:rgba(0,0,0,.18); display:flex; align-items:flex-end; justify-content:flex-end; padding:0 6px 4px 0; }
    .display-hint{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:14px; font-weight:700; color:var(--muted); pointer-events:none; text-align:center; }

    /* Player circles */
    .chip{ position:absolute; transform:translate(-50%,-50%); border-radius:999px; background:#fff;
      display:flex; align-items:center; justify-content:center; text-align:center; line-height:1.1;
      box-shadow:0 6px 14px rgba(0,0,0,.14); border:6px solid var(--red); cursor:grab; touch-action:none; z-index:3; }
    .chip.front{ border-width:9px; }
    .chip.display-chip{ cursor:default; }
    .chip .spec{ font-weight:900; font-size:min(2.4vw,22px); }
    .chip .pname{ font-size:min(1.5vw,13px); font-weight:700; opacity:.85; margin-top:2px; }
    @media(max-width:900px){ .chip .spec{ font-size:min(4vw,17px); } .chip .pname{ font-size:min(2.8vw,11px); } }
    .chip.dragging{ cursor:grabbing; box-shadow:0 12px 24px rgba(0,0,0,.2); z-index:10; }

    /* Buttons row */
    .btn-row{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .btn{ -webkit-appearance:none; appearance:none; border:1px solid var(--line); background:#fff; padding:10px 14px; border-radius:12px; font-weight:800; font-size:13px; cursor:pointer; box-shadow:0 4px 10px rgba(0,0,0,.07); }
    .btn:active{ transform:translateY(1px); }
    .btn.red{ border-color:var(--red); color:var(--red); }

    /* Tabs */
    .tabs{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .tab{ -webkit-appearance:none; appearance:none; border:2px solid var(--line); background:#fff; padding:8px 14px; border-radius:12px; font-weight:800; font-size:13px; cursor:pointer; }
    .tab.active{ background:var(--red); border-color:var(--red); color:#fff; }
    .display-title{ font-size:15px; font-weight:900; color:var(--red); margin-top:8px; min-height:20px; }

    /* Right panel */
    .panel{ display:grid; gap:12px; }

    /* Name grid */
    .name-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
    @media(min-width:900px){ .name-grid{ grid-template-columns:1fr 1fr 1fr; } }
    .name-cell{ border:1px solid var(--line); border-radius:12px; padding:8px; }
    .name-cell .badge{ display:flex; align-items:center; gap:6px; margin-bottom:6px; }
    .name-cell .spec-badge{ min-width:44px; height:28px; border-radius:999px; border:2px solid var(--red); display:flex; align-items:center; justify-content:center; font-weight:900; font-size:12px; }
    .name-cell .pos-label{ font-size:11px; font-weight:700; color:var(--muted); }
    .name-sel{ width:100%; padding:7px 8px; border-radius:10px; border:1px solid var(--line); font-size:13px; background:#fff; outline:none; }

    /* Lib boxes */
    .lib-box{ background:var(--card); border-radius:14px; box-shadow:0 6px 14px rgba(0,0,0,.06); padding:12px; border:1px solid var(--line); }
    .lib-title{ font-weight:900; font-size:15px; color:var(--red); margin-bottom:8px; }
    .lib-btns{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; min-height:24px; }
    .lib-btn{ -webkit-appearance:none; appearance:none; border:1px solid var(--line); background:#f8f8f8; padding:5px 10px; border-radius:8px; font-weight:700; font-size:12px; cursor:pointer; }
    .lib-btn:active{ background:#eee; }
    .lib-save-row{ display:flex; gap:6px; }
    .lib-inp{ flex:1; padding:7px 10px; border-radius:10px; border:1px solid var(--line); font-size:13px; outline:none; }
    .lib-save-btn{ -webkit-appearance:none; appearance:none; background:#e3f2fd; border:1px solid #2196f3; color:#1565c0; padding:7px 12px; border-radius:10px; font-weight:800; font-size:13px; cursor:pointer; white-space:nowrap; }
    .no-lib{ font-size:12px; color:var(--muted); margin-bottom:6px; }

    /* Save current button */
    .save-current-row{ display:flex; gap:8px; align-items:center; margin-top:10px; flex-wrap:wrap; }
    .save-current-hint{ font-size:12px; color:var(--muted); flex:1; }
    .save-current-btn{ -webkit-appearance:none; appearance:none; background:#e3f2fd; border:1px solid #2196f3; color:#1565c0; padding:9px 14px; border-radius:12px; font-weight:800; font-size:13px; cursor:pointer; }
    .save-current-btn:disabled{ opacity:.4; cursor:not-allowed; }
  </style>
</head>
<body>
<div style="background:var(--red);height:5px;"></div>
<div class="wrap">

  <!-- Left: courts -->
  <div class="card">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px;">
      <div>
        <div class="app-title">Volleyball <span>Aufstellungen</span></div>
        <div class="current-laufer" id="currentLaufer"></div>
        <div class="subtitle">Drag &amp; Drop · Rotation +1</div>
      </div>
      <div style="display:flex;gap:6px;">
        <button class="btn red" id="btnReset">Reset</button>
      </div>
    </div>

    <!-- Interactive field -->
    <div class="court interactive" id="courtEdit">
      <div class="net-grid"></div>
      <div id="halfEdit"></div>
    </div>

    <div class="btn-row">
      <button class="btn" id="btnRot">Rotation +1</button>
      <button class="btn" id="btnSpots">Zurücksetzen</button>
    </div>

    <!-- Display field -->
    <div class="tabs" id="tabsRow">
      <button class="tab active" data-tab="grund">Grundaufstellung</button>
      <button class="tab" data-tab="annahme">Annahme</button>
      <button class="tab" data-tab="aufschlag">Bei eigenem Aufschlag</button>
    </div>
    <div class="display-title" id="displayTitle"></div>
    <div class="court display" id="courtDisplay">
      <div class="net-grid"></div>
      <div id="halfDisplay">
        <div class="display-hint">Läufer wählen →</div>
      </div>
    </div>

    <div class="save-current-row">
      <div class="save-current-hint" id="saveHint">Läufer wählen, dann hier speichern</div>
      <button class="save-current-btn" id="btnSaveCurrent" disabled>💾 Aktuelle Aufstellung speichern</button>
    </div>
  </div>

  <!-- Right: name panel + libs -->
  <div class="panel">
    <div class="card">
      <div class="name-grid" id="nameGrid"></div>
    </div>

    <div class="lib-box" id="libGrund"><div class="lib-title">Grundaufstellung</div></div>
    <div class="lib-box" id="libAnnahme"><div class="lib-title">Annahme</div></div>
    <div class="lib-box" id="libAufschlag"><div class="lib-title">Bei eigenem Aufschlag</div></div>
  </div>
</div>

<script>
(() => {
'use strict';

// ── Constants ──
const SERVER = "https://scoreboard-rzql.onrender.com";
const LS_KEY = "vb_neu_v2";

// Fixed specializations for positions 1-6 (start positions)
const SPECS = {1:'Z', 2:'A', 3:'M', 4:'D', 5:'A', 6:'M'};
const ROT = {1:6, 2:1, 3:2, 4:3, 5:4, 6:5}; // rotation +1: pos→new pos

// Net at top: front row = 4,3,2 (netznah), back row = 5,6,1
const DEFAULT_XY = {
  4:{x:20,y:22}, 3:{x:50,y:18}, 2:{x:80,y:22},
  5:{x:20,y:72}, 6:{x:50,y:80}, 1:{x:80,y:72}
};

const NAMES = ["","Alessa","Alma","Anna","Elif","Ella","Emma","Frida","Greta","Hannah",
  "Johanna","Jule","Malou","Marie","Milva","Philippa","Zeynep"];

const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const cssEsc = s => CSS.escape(String(s));
const p2px = (p,s) => (p/100)*s;
const px2p = (px,s) => s===0?0:(px/s)*100;
const clamp = (n,a,b) => Math.max(a,Math.min(b,n));

// ── State ──
// Each player: { id, spec, name, pos, x, y }
// spec is fixed to the player (Z stays Z), pos changes with rotation
function defPlayers(){
  return [1,2,3,4,5,6].map(pos => ({
    id: `S${pos}`,
    spec: SPECS[pos],
    name: "",
    pos,
    x: DEFAULT_XY[pos].x,
    y: DEFAULT_XY[pos].y,
  }));
}
function defState(){ return { v:2, players: defPlayers() }; }
function loadState(){
  try{
    const r=localStorage.getItem(LS_KEY);
    if(!r)return null;
    const s=JSON.parse(r);
    if(!s||s.v!==2)return null;
    return s;
  }catch{return null;}
}
let state = loadState() || defState();
const save = () => { try{localStorage.setItem(LS_KEY,JSON.stringify(state));}catch{} };

// ── Lib ──
async function loadLib(k){
  try{const c=localStorage.getItem(`vb_lib2_${k}`);if(c){const d=JSON.parse(c);if(d.length)return d;}}catch{}
  try{
    const ctrl=new AbortController();
    const tid=setTimeout(()=>ctrl.abort(),5000);
    const r=await fetch(`${SERVER}/lib/${k}?t=${Date.now()}`,{cache:"no-store",signal:ctrl.signal});
    clearTimeout(tid);
    if(r.ok){const d=await r.json();if(d.length){try{localStorage.setItem(`vb_lib2_${k}`,JSON.stringify(d));}catch{}return d;}}
  }catch{}
  return[];
}
async function saveLib(k,lib){
  try{localStorage.setItem(`vb_lib2_${k}`,JSON.stringify(lib));}catch{}
  try{
    const ctrl=new AbortController();
    const tid=setTimeout(()=>ctrl.abort(),5000);
    await fetch(`${SERVER}/lib/${k}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(lib),signal:ctrl.signal});
    clearTimeout(tid);
  }catch{}
}

// ── Active display state ──
let activeTab = "grund";
let activeFormation = null; // { name, players: [{id,spec,pos,x,y}] }

// ── Courts ──
const courtEdit = document.getElementById("courtEdit");
const halfEdit = document.getElementById("halfEdit");
const courtDisplay = document.getElementById("courtDisplay");
const halfDisplay = document.getElementById("halfDisplay");

function getRect(el){ const r=el.getBoundingClientRect(); return {w:r.width,h:r.height}; }

function renderZones(el){
  el.querySelectorAll(".zones").forEach(n=>n.remove());
  const z=document.createElement("div"); z.className="zones";
  const v1=document.createElement("div"); v1.className="zone-line-v"; v1.style.left="33.333%";
  const v2=document.createElement("div"); v2.className="zone-line-v"; v2.style.left="66.666%";
  const h=document.createElement("div"); h.className="zone-line-h";
  z.appendChild(v1); z.appendChild(v2); z.appendChild(h);
  [[4,0,0],[3,1,0],[2,2,0],[5,0,1],[6,1,1],[1,2,1]].forEach(([n,c,r])=>{
    const d=document.createElement("div"); d.className="zone-num";
    d.style.left=`${c*100/3}%`; d.style.top=`${r*50}%`;
    d.style.width=`${100/3}%`; d.style.height="50%";
    d.textContent=n; z.appendChild(d);
  });
  el.appendChild(z);
}

function renderEditField(){
  halfEdit.querySelectorAll(".chip,.three-m,.three-m-lbl").forEach(n=>n.remove());
  renderZones(halfEdit);
  const ln=document.createElement("div"); ln.className="three-m";
  const lb=document.createElement("div"); lb.className="three-m-lbl"; lb.textContent="3m";
  halfEdit.appendChild(ln); halfEdit.appendChild(lb);

  const {w,h}=getRect(courtEdit);
  state.players.forEach(p=>{
    const size=Math.min(w,h)*0.18;
    const el=document.createElement("div");
    el.className="chip"+(([2,3,4].includes(p.pos))?" front":"");
    el.dataset.id=p.id;
    el.style.cssText=`width:${size}px;height:${size}px;left:${p2px(p.x,w)}px;top:${p2px(p.y,h)}px;font-size:${size*0.22}px;`;
    el.innerHTML=`<div><div class="spec">${p.spec}${p.pos}</div><div class="pname">${esc(p.name)}</div></div>`;
    halfEdit.appendChild(el);
  });
}

function renderDisplayField(){
  halfDisplay.innerHTML="";
  const hint=document.createElement("div"); hint.className="display-hint"; hint.textContent="Läufer wählen →";

  if(!activeFormation){ halfDisplay.appendChild(hint); return; }

  renderZones(halfDisplay);
  const ln=document.createElement("div"); ln.className="three-m";
  const lb=document.createElement("div"); lb.className="three-m-lbl"; lb.textContent="3m";
  halfDisplay.appendChild(ln); halfDisplay.appendChild(lb);

  const {w,h}=getRect(courtDisplay);
  // Build map: saved player id → live player (for name lookup)
  const liveById={};
  state.players.forEach(p=>{ liveById[p.id]=p; });

  activeFormation.players.forEach(p=>{
    const live=liveById[p.id];
    const size=Math.min(w,h)*0.18;
    const el=document.createElement("div");
    el.className="chip display-chip"+(([2,3,4].includes(p.pos))?" front":"");
    el.style.cssText=`width:${size}px;height:${size}px;left:${p2px(p.x,w)}px;top:${p2px(p.y,h)}px;font-size:${size*0.22}px;z-index:4;`;
    el.innerHTML=`<div><div class="spec">${p.spec}${p.pos}</div><div class="pname">${esc(live?.name||"")}</div></div>`;
    halfDisplay.appendChild(el);
  });
}

// ── Name panel ──
function renderNameGrid(){
  const grid=document.getElementById("nameGrid");
  grid.innerHTML="";
  state.players.slice().sort((a,b)=>a.pos-b.pos).forEach(p=>{
    const cell=document.createElement("div"); cell.className="name-cell"; cell.dataset.id=p.id;
    const usedNames=new Set(state.players.filter(x=>x.id!==p.id&&x.name).map(x=>x.name));
    const opts=NAMES.filter(n=>n===""||n===p.name||!usedNames.has(n))
      .map(n=>`<option value="${esc(n)}">${n||"—"}</option>`).join("");
    cell.innerHTML=`
      <div class="badge">
        <div class="spec-badge">${p.spec}${p.pos}</div>
        <div class="pos-label">Pos ${p.pos}</div>
      </div>
      <select class="name-sel">${opts}</select>`;
    const sel=cell.querySelector("select");
    sel.value=p.name||"";
    sel.addEventListener("change",()=>{
      p.name=sel.value;
      save();
      // Update chip on field
      const chip=halfEdit.querySelector(`.chip[data-id="${cssEsc(p.id)}"]`);
      if(chip) chip.querySelector(".pname").textContent=p.name;
      // Update display field if active
      renderDisplayField();
      // Update other selects without losing their values
      grid.querySelectorAll(".name-cell").forEach(other=>{
        if(other===cell)return;
        const oid=other.dataset.id;
        const op=state.players.find(x=>x.id===oid); if(!op)return;
        const otherSel=other.querySelector("select");
        const curVal=otherSel.value;
        const usedN=new Set(state.players.filter(x=>x.id!==op.id&&x.name).map(x=>x.name));
        otherSel.innerHTML=NAMES.filter(n=>n===""||n===op.name||!usedN.has(n))
          .map(n=>`<option value="${esc(n)}">${n||"—"}</option>`).join("");
        otherSel.value=curVal;
      });
      updateCurrentLaufer();
    });
    grid.appendChild(cell);
  });
}

// ── Auto title ──
function updateCurrentLaufer(){
  const z=state.players.find(p=>p.spec==="Z");
  document.getElementById("currentLaufer").textContent=z?`Läufer ${z.pos}`:"";
}

// ── Actions ──
function rotate(){
  state.players=state.players.map(p=>{
    const newPos=ROT[p.pos];
    return {...p, pos:newPos, x:DEFAULT_XY[newPos].x, y:DEFAULT_XY[newPos].y};
  });
  save(); renderEditField(); renderNameGrid(); updateCurrentLaufer();
}

function resetSpots(){
  state.players=state.players.map(p=>({...p, x:DEFAULT_XY[p.pos].x, y:DEFAULT_XY[p.pos].y}));
  save(); renderEditField();
}

function resetAll(){
  state=defState(); save();
  renderEditField(); renderNameGrid(); updateCurrentLaufer();
}

// ── Lib ──
const LIB_MAP={grund:"libGrund", annahme:"libAnnahme", aufschlag:"libAufschlag"};

async function renderLibBox(k){
  const box=document.getElementById(LIB_MAP[k]);
  const title=box.querySelector(".lib-title");
  box.innerHTML=""; box.appendChild(title);

  const lib=await loadLib(k);
  const btns=document.createElement("div"); btns.className="lib-btns";
  if(lib.length===0){
    const h=document.createElement("div"); h.className="no-lib"; h.textContent="Noch keine Aufstellungen.";
    btns.appendChild(h);
  } else {
    lib.forEach(e=>{
      const b=document.createElement("button"); b.className="lib-btn"; b.textContent=e.name;
      b.addEventListener("click",()=>loadFormation(k,e.name));
      btns.appendChild(b);
    });
  }
  box.appendChild(btns);

  const sr=document.createElement("div"); sr.className="lib-save-row";
  const inp=document.createElement("input"); inp.className="lib-inp"; inp.placeholder="Name…"; inp.maxLength=40;
  const sbtn=document.createElement("button"); sbtn.className="lib-save-btn"; sbtn.textContent="💾 Speichern";
  sbtn.addEventListener("mousedown",e=>e.preventDefault());
  sbtn.addEventListener("click",()=>{ if(inp.value.trim()) saveFormation(k,inp.value); });
  inp.addEventListener("keydown",e=>{ if(e.key==="Enter"&&inp.value.trim()) saveFormation(k,inp.value); });
  sr.appendChild(inp); sr.appendChild(sbtn);
  box.appendChild(sr);
}

async function saveFormation(k,name){
  name=name.trim(); if(!name)return;
  const lib=await loadLib(k);
  const entry={
    name,
    players: state.players.map(p=>({id:p.id,spec:p.spec,pos:p.pos,x:p.x,y:p.y}))
  };
  const idx=lib.findIndex(e=>e.name===name);
  if(idx>=0)lib[idx]=entry; else lib.push(entry);
  await saveLib(k,lib);
  // Update buttons without rebuilding input
  const box=document.getElementById(LIB_MAP[k]);
  let btns=box.querySelector(".lib-btns");
  if(btns) btns.remove();
  btns=document.createElement("div"); btns.className="lib-btns";
  lib.forEach(e=>{
    const b=document.createElement("button"); b.className="lib-btn"; b.textContent=e.name;
    b.addEventListener("click",()=>loadFormation(k,e.name));
    btns.appendChild(b);
  });
  box.insertBefore(btns, box.querySelector(".lib-save-row"));
  box.querySelector(".lib-inp").value="";
}

async function loadFormation(k,name){
  const lib=await loadLib(k);
  const entry=lib.find(e=>e.name===name); if(!entry)return;
  activeTab=k; activeFormation=entry;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===k));
  const labels={grund:"Grundaufstellung",annahme:"Annahme",aufschlag:"Bei eigenem Aufschlag"};
  document.getElementById("displayTitle").textContent=`${labels[k]} · ${name}`;
  renderDisplayField();
  updateSaveBtn();
}

function updateSaveBtn(){
  const btn=document.getElementById("btnSaveCurrent");
  const hint=document.getElementById("saveHint");
  if(activeFormation){
    btn.disabled=false;
    hint.textContent=`Speichert aktuelle Positionen als „${activeFormation.name}"`;
  } else {
    btn.disabled=true;
    hint.textContent="Läufer wählen, dann hier speichern";
  }
}

document.getElementById("btnSaveCurrent").addEventListener("click",async()=>{
  if(!activeFormation)return;
  await saveFormation(activeTab, activeFormation.name);
  await loadFormation(activeTab, activeFormation.name);
});

// ── Tabs ──
document.querySelectorAll(".tab").forEach(tab=>{
  tab.addEventListener("click",async()=>{
    activeTab=tab.dataset.tab;
    document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t===tab));
    if(activeFormation){
      const lib=await loadLib(activeTab);
      const entry=lib.find(e=>e.name===activeFormation.name);
      if(entry){
        activeFormation=entry;
        const labels={grund:"Grundaufstellung",annahme:"Annahme",aufschlag:"Bei eigenem Aufschlag"};
        document.getElementById("displayTitle").textContent=`${labels[activeTab]} · ${activeFormation.name}`;
      } else {
        activeFormation=null;
        document.getElementById("displayTitle").textContent="";
      }
      renderDisplayField();
    }
  });
});

// ── Drag ──
let drag=null;
courtEdit.addEventListener("pointerdown",e=>{
  const t=e.target.closest(".chip"); if(!t)return; e.preventDefault();
  const p=state.players.find(x=>x.id===t.dataset.id); if(!p)return;
  const cr=courtEdit.getBoundingClientRect();
  const {w,h}=getRect(courtEdit);
  drag={id:p.id,ptr:e.pointerId,ox:p2px(p.x,w)-(e.clientX-cr.left),oy:p2px(p.y,h)-(e.clientY-cr.top)};
  t.classList.add("dragging"); t.setPointerCapture(e.pointerId);
});
courtEdit.addEventListener("pointermove",e=>{
  if(!drag||e.pointerId!==drag.ptr)return;
  const p=state.players.find(x=>x.id===drag.id); if(!p)return;
  const cr=courtEdit.getBoundingClientRect();
  const {w,h}=getRect(courtEdit);
  const pad=Math.min(w,h)*0.09;
  p.x=clamp(px2p(e.clientX-cr.left+drag.ox,w),0,100);
  p.y=clamp(px2p(e.clientY-cr.top+drag.oy,h),0,100);
  const chip=halfEdit.querySelector(`.chip[data-id="${cssEsc(p.id)}"]`);
  if(chip){chip.style.left=`${p2px(p.x,w)}px`;chip.style.top=`${p2px(p.y,h)}px`;}
  save();
});
courtEdit.addEventListener("pointerup",e=>{
  if(!drag||e.pointerId!==drag.ptr)return;
  halfEdit.querySelector(`.chip[data-id="${cssEsc(drag.id)}"]`)?.classList.remove("dragging");
  drag=null;
});
courtEdit.addEventListener("pointercancel",()=>{ drag=null; });

// ── Wire buttons ──
document.getElementById("btnRot").addEventListener("click",rotate);
document.getElementById("btnSpots").addEventListener("click",resetSpots);
document.getElementById("btnReset").addEventListener("click",()=>{ if(confirm("Alles zurücksetzen?")) resetAll(); });
window.addEventListener("resize",()=>{ renderEditField(); renderDisplayField(); });

// ── Init ──
async function init(){
  renderEditField();
  renderNameGrid();
  updateCurrentLaufer();
  await Promise.all([renderLibBox("grund"),renderLibBox("annahme"),renderLibBox("aufschlag")]);
}
init();

})();
</script>
