<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Volleyball Läufer-Anzeige</title>
  <style>
    :root{
      --bg:#f6f7fb; --card:#fff; --line:rgba(0,0,0,.14);
      --shadow:0 12px 24px rgba(0,0,0,.08); --shadow2:0 10px 18px rgba(0,0,0,.08);
      --radius:18px; --blue:#1565c0; --red:#c62828;
    }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:var(--bg); color:#111; }

    .wrap{ max-width:1300px; margin:0 auto; padding:12px; display:grid; gap:14px; grid-template-columns:1.15fr .85fr; align-items:start; }
    @media(max-width:980px){ .wrap{ grid-template-columns:1fr; } }

    .card{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:12px; }
    .header{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:10px; }
    .board-title{ font-weight:900; font-size:22px; }
    .formation-title{ font-weight:900; font-size:20px; color:var(--red); min-height:26px; margin-top:2px; }
    .subtitle{ opacity:.7; font-size:12px; margin-top:2px; }
    .row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .btn{ -webkit-appearance:none; appearance:none; border:1px solid var(--line); background:#fff; padding:10px 12px; border-radius:14px; font-weight:800; cursor:pointer; box-shadow:0 6px 12px rgba(0,0,0,.08); }
    .btn:active{ transform:translateY(1px); }
    .btn.unlock-active{ background:#fff3cd; border-color:#f0a500; color:#8a5c00; }

    /* Half courts */
    .half-court{
      position:relative; width:100%; border-radius:6px;
      border:7px solid var(--blue);
      background:linear-gradient(180deg,rgba(240,248,255,1) 0%,rgba(245,245,245,1) 100%);
      overflow:hidden;
    }
    .half-court.interactive{ height:min(42vh,480px); touch-action:none; user-select:none; transition:border-color .2s; }
    .half-court.interactive.unlocked{ border-color:#f0a500; box-shadow:0 0 0 3px rgba(240,165,0,.2); }
    .half-court.display{ height:min(42vh,480px); margin-top:10px; }
    @media(max-width:980px){
      .half-court.interactive{ height:38vh; }
      .half-court.display{ height:38vh; }
    }

    /* Net grid at top of interactive field (net is above) */
    .net-grid{
      position:absolute; top:0; left:0; right:0; height:16px; z-index:2; pointer-events:none;
      background-image:
        repeating-linear-gradient(90deg,var(--blue) 0px,var(--blue) 4px,transparent 4px,transparent 14px),
        repeating-linear-gradient(0deg,var(--blue) 0px,var(--blue) 3px,transparent 3px,transparent 9px);
      border-bottom:2px solid var(--blue);
    }

    .three-meter{ position:absolute; left:0; right:0; height:6px; background:var(--blue); pointer-events:none; }
    .three-meter-label{ position:absolute; right:6px; font-size:10px; font-weight:800; color:var(--blue); pointer-events:none; line-height:1; }

    .zones{ position:absolute; inset:0; pointer-events:none; }
    .zones .v1,.zones .v2{ position:absolute; top:0; bottom:0; width:1px; background:rgba(0,0,0,.06); }
    .zones .v1{ left:33.333%; } .zones .v2{ left:66.666%; }
    .zones .hmid{ position:absolute; left:0; right:0; top:50%; height:1px; background:rgba(0,0,0,.06); }
    .zone-num{ position:absolute; display:flex; align-items:center; justify-content:center; font-weight:900; color:rgba(0,0,0,.10); font-size:min(2vw,20px); }

    /* Display field label */
    .display-label{
      position:absolute; top:20px; left:50%; transform:translateX(-50%);
      font-size:13px; font-weight:900; opacity:.35; letter-spacing:.08em;
      pointer-events:none; text-transform:uppercase;
    }

    /* Players */
    .player{
      position:absolute; transform:translate(-50%,-50%);
      width:min(9vw,88px); height:min(9vw,88px);
      border-radius:999px; background:#fff;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 8px 16px rgba(0,0,0,.15); border:6px solid var(--red);
      touch-action:none; cursor:grab; padding:5px;
    }
    .player.display-player{
      cursor:default;
      box-shadow:0 4px 10px rgba(0,0,0,.10);
      opacity:.92;
    }
    @media(max-width:980px){ .player{ width:min(13vw,68px); height:min(13vw,68px); } }
    .player.dragging{ cursor:grabbing; box-shadow:0 14px 28px rgba(0,0,0,.22); z-index:10; }
    .player .inner{ width:100%; text-align:center; line-height:1.05; }
    .player .topLine{ font-weight:900; font-size:min(2.2vw,20px); }
    .player .bottomLine{ font-weight:800; font-size:min(1.4vw,13px); opacity:.85; margin-top:3px; }
    @media(max-width:980px){ .player .topLine{ font-size:min(3.5vw,15px); } .player .bottomLine{ font-size:min(2.5vw,11px); } }

    /* Display field tabs */
    .display-tabs{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
    .tab-btn{
      -webkit-appearance:none; appearance:none;
      border:2px solid var(--line); background:#fff;
      padding:8px 16px; border-radius:12px; font-weight:800; font-size:13px;
      cursor:pointer; transition:all .15s;
    }
    .tab-btn.active{ background:var(--red); border-color:var(--red); color:#fff; }
    .tab-btn:not(.active):hover{ border-color:var(--red); color:var(--red); }
    .display-title{ font-weight:900; font-size:16px; margin-top:10px; margin-bottom:4px; color:var(--red); min-height:22px; }

    /* Right panel */
    .panel{ display:grid; gap:14px; }
    .team-card{ background:var(--card); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow2); padding:12px; }
    .team-actions{ display:flex; gap:8px; margin-bottom:10px; }
    .team-actions .btn{ flex:1; padding:8px; font-size:13px; }
    .grid{ display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; }
    @media(min-width:980px){ .grid{ grid-template-columns:repeat(3,minmax(0,1fr)); } }
    .pedit{ border:1px solid rgba(0,0,0,.10); border-radius:14px; padding:8px; }
    .pedit .top{ display:flex; align-items:center; gap:8px; }
    .miniBadge{ min-width:48px; height:30px; border-radius:999px; display:flex; align-items:center; justify-content:center; font-weight:900; border:2px solid var(--red); padding:0 8px; text-align:center; font-size:13px; }
    .meta{ flex:1; min-width:0; }
    .meta .p1{ font-weight:900; font-size:12px; }
    .meta .p2{ opacity:.7; font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .inputs{ display:flex; gap:6px; margin-top:6px; }
    .small{ width:100%; padding:7px 8px; border-radius:12px; border:1px solid var(--line); outline:none; font-size:12px; background:#fff; }

    /* Lib boxes */
    .lib-box{ background:var(--card); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow2); padding:12px; }
    .lib-box-title{ font-weight:900; font-size:16px; margin-bottom:8px; }
    .preset-row{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:6px; }
    .preset-btn{ -webkit-appearance:none; appearance:none; border:1px solid var(--line); background:#f8f9fa; padding:6px 10px; border-radius:10px; font-weight:700; font-size:12px; cursor:pointer; }
    .preset-btn:active{ transform:translateY(1px); background:#e9ecef; }
    .no-lib{ font-size:12px; opacity:.5; margin-bottom:8px; }
    .lib-save-row{ display:flex; gap:6px; }
    .lib-name-input{ flex:1; padding:8px 10px; border-radius:12px; border:1px solid var(--line); outline:none; font-size:13px; background:#fff; }
    .lib-btn{ -webkit-appearance:none; appearance:none; border:1px solid var(--line); background:#fff; padding:8px 12px; border-radius:12px; font-weight:800; font-size:13px; cursor:pointer; white-space:nowrap; }
    .lib-btn.save{ background:#e3f2fd; border-color:#2196f3; color:#1565c0; }

    /* Name manager */
    .name-mgr{ background:var(--card); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow2); padding:12px; }
    .name-mgr-title{ font-weight:900; font-size:16px; margin-bottom:8px; }
    .name-mgr-row{ display:flex; gap:6px; margin-bottom:8px; }
    .name-mgr-input{ flex:1; padding:8px 10px; border-radius:12px; border:1px solid var(--line); outline:none; font-size:13px; background:#fff; }
    .name-mgr-add{ -webkit-appearance:none; appearance:none; background:#e8f5e9; border:1px solid #4caf50; color:#2e7d32; padding:8px 14px; border-radius:12px; font-weight:800; font-size:13px; cursor:pointer; }
    .name-tags{ display:flex; flex-wrap:wrap; gap:6px; }
    .name-tag{ display:inline-flex; align-items:center; gap:4px; background:#f0f4ff; border:1px solid #c5cae9; border-radius:20px; padding:4px 10px; font-size:12px; font-weight:700; }
    .name-tag.base{ background:#f5f5f5; border-color:#e0e0e0; color:#555; }
    .name-tag-del{ border:none; background:none; cursor:pointer; font-size:11px; color:#e91e63; padding:0; line-height:1; }
  </style>
</head>
<body>
<div class="wrap">

  <!-- Left: courts -->
  <div class="card">
    <div class="header">
      <div>
        <div class="board-title">Volleyball Aufstellungen</div>
        <div class="formation-title" id="formation-title"></div>
        <div class="subtitle">Drag &amp; Drop · Rotation +1 · Speichern &nbsp;<span id="syncStatus" style="font-size:11px;font-weight:700;"></span></div>
      </div>
      <div class="row">
        <button class="btn" id="btnUnlock">🔒 Gesperrt</button>
        <button class="btn" id="resetAll">Reset</button>
      </div>
    </div>

    <!-- Interactive half field -->
    <div class="half-court interactive" id="courtEdit">
      <div class="net-grid"></div>
      <div id="halfEdit"></div>
    </div>

    <div class="row" style="margin-top:10px;">
      <button class="btn" id="rotA">Rotation +1</button>
      <button class="btn" id="spotsA">Zurücksetzen</button>
    </div>

    <!-- Display half field -->
    <div class="display-tabs">
      <button class="tab-btn active" data-tab="grund">Grundaufstellung</button>
      <button class="tab-btn" data-tab="annahme">Annahme</button>
      <button class="tab-btn" data-tab="aufschlag">Bei eigenem Aufschlag</button>
    </div>
    <div class="display-title" id="displayTitle">— Läufer wählen —</div>
    <div class="half-court display" id="courtDisplay">
      <div class="net-grid"></div>
      <div class="display-label" id="displayLabel">Läufer wählen</div>
      <div id="halfDisplay"></div>
    </div>
  </div>

  <!-- Right: panel + libs -->
  <div class="panel">
    <div class="team-card" id="teamCard"></div>

    <div class="lib-box" id="libBoxGrund">
      <div class="lib-box-title" style="color:var(--red)">Grundaufstellung</div>
    </div>
    <div class="lib-box" id="libBoxAnnahme">
      <div class="lib-box-title" style="color:var(--red)">Annahme</div>
    </div>
    <div class="lib-box" id="libBoxAufschlag">
      <div class="lib-box-title" style="color:var(--red)">Bei eigenem Aufschlag</div>
    </div>
  </div>
</div>

<script>
(() => {
  const LS_KEY = "vb_viewer_v1";
  const SERVER_URL = "https://scoreboard-rzql.onrender.com";

  // Net at top → front row (4,3,2) near top, back row (5,6,1) near bottom
  const SPOTS = {4:{x:20,y:22},3:{x:50,y:18},2:{x:80,y:22},5:{x:20,y:72},6:{x:50,y:80},1:{x:80,y:72}};
  const ROT1  = {1:6,6:5,5:4,4:3,3:2,2:1};
  const LETTERS = ["","Z","A","M","D","L"];
  const BASE_NAMES = ["Alessa","Alma","Anna","Elif","Ella","Emma","Frida","Greta","Hannah",
      "Johanna","Jule","Malou","Marie","Milva","Philippa","Zeynep"];
  const LS_NAMES_KEY = "vb_custom_names_v1";
  function loadCustomNames(){ try{const r=localStorage.getItem(LS_NAMES_KEY);return r?JSON.parse(r):[];}catch{return[];} }
  function saveCustomNames(a){ try{localStorage.setItem(LS_NAMES_KEY,JSON.stringify(a));}catch{} }
  let customNames=loadCustomNames();
  function buildNames(){ return ["",...[...BASE_NAMES,...customNames].sort((a,b)=>a.localeCompare(b,"de"))]; }
  let NAMES=buildNames();

  const MX=4,MY=4;
  const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
  const px2p=(px,s)=>s===0?0:(px/s)*100;
  const p2px=(p,s)=>(p/100)*s;
  const spot=(pos)=>SPOTS[pos]||{x:50,y:50};
  const esc=(s)=>String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
  const cssEsc=(s)=>CSS.escape(String(s));

  // ── State ──
  function defPlayers(){ return [1,2,3,4,5,6].map(n=>{const sp=spot(n);return{id:`P${n}`,letter:"",name:"",pos:n,x:sp.x,y:sp.y};}); }
  function defState(){ return{version:1,unlocked:false,players:defPlayers()}; }
  function loadState(){
    try{
      const r=localStorage.getItem(LS_KEY);if(!r)return null;
      const s=JSON.parse(r);if(!s||s.version!==1)return null;
      s.players.forEach(p=>{if(!p.letter)p.letter="";if(!p.name)p.name="";});
      return s;
    }catch{return null;}
  }
  let state=loadState()||defState();
  const save=()=>{ try{localStorage.setItem(LS_KEY,JSON.stringify(state));}catch{}; };

  // ── Server lib ──
  async function loadLib(k){
    try{
      const r=await fetch(`${SERVER_URL}/lib/${k}?t=${Date.now()}`,{cache:"no-store"});
      if(r.ok){const d=await r.json();if(d.length>0){try{localStorage.setItem(`vb_lib_cache_${k}`,JSON.stringify(d));}catch{}return d;}}
    }catch{}
    try{const c=localStorage.getItem(`vb_lib_cache_${k}`);if(c)return JSON.parse(c);}catch{}
    return[];
  }
  async function saveLib(k,lib){
    try{localStorage.setItem(`vb_lib_cache_${k}`,JSON.stringify(lib));}catch{}
    try{await fetch(`${SERVER_URL}/lib/${k}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(lib)});}catch{}
  }

  // ── Display state ──
  let activeTab="grund";
  let activeFormation=null; // { name, players }

  function setTitle(n){ document.getElementById("formation-title").textContent=n||""; }
  function setSyncStatus(t,c){ const el=document.getElementById("syncStatus");if(el){el.textContent=t;el.style.color=c;} }

  // ── Constraints ──
  function byPos(players){ const m={};players.forEach(p=>m[p.pos]=p);return m; }
  function applyC(pos,x,y,m){
    const p1=m[1],p2=m[2],p3=m[3],p4=m[4],p5=m[5],p6=m[6];
    let x0=0,x1=100,y0=0,y1=100;
    if(pos===3){y1=Math.min(y1,p6.y-MY);x0=Math.max(x0,p4.x+MX);x1=Math.min(x1,p2.x-MX);}
    if(pos===6){y0=Math.max(y0,p3.y+MY);x0=Math.max(x0,p5.x+MX);x1=Math.min(x1,p1.x-MX);}
    if(pos===5){y0=Math.max(y0,p4.y+MY);x1=Math.min(x1,p6.x-MX);}
    if(pos===1){y0=Math.max(y0,p2.y+MY);x0=Math.max(x0,p6.x+MX);}
    if(pos===2){x0=Math.max(x0,p3.x+MX);y1=Math.min(y1,p1.y-MY);}
    if(pos===4){x1=Math.min(x1,p3.x-MX);y1=Math.min(y1,p5.y-MY);}
    if(x0>x1){const mv=(x0+x1)/2;x0=mv;x1=mv;}
    if(y0>y1){const mv=(y0+y1)/2;y0=mv;y1=mv;}
    return{x:clamp(x,x0,x1),y:clamp(y,y0,y1)};
  }
  function badgeTop(p){ return p.letter?`${p.letter}${p.pos}`:`${p.pos}`; }
  function badgeBot(p){ return p.name||""; }

  // ── Render zones ──
  function renderZones(halfEl){
    halfEl.querySelectorAll(".zones").forEach(n=>n.remove());
    const z=document.createElement("div");z.className="zones";
    z.innerHTML=`<div class="v1"></div><div class="v2"></div><div class="hmid"></div>`;
    [{n:4,c:0,r:0},{n:3,c:1,r:0},{n:2,c:2,r:0},{n:5,c:0,r:1},{n:6,c:1,r:1},{n:1,c:2,r:1}].forEach(zn=>{
      const d=document.createElement("div");d.className="zone-num";d.textContent=zn.n;
      d.style.left=`${(zn.c*100)/3}%`;d.style.top=`${(zn.r*100)/2}%`;d.style.width=`${100/3}%`;d.style.height=`${100/2}%`;
      z.appendChild(d);
    });
    halfEl.appendChild(z);
  }

  function render3mLine(halfEl, linePos){
    halfEl.querySelectorAll(".three-meter,.three-meter-label").forEach(n=>n.remove());
    const ln=document.createElement("div");ln.className="three-meter";ln.style.top=`${linePos}%`;
    const lb=document.createElement("div");lb.className="three-meter-label";lb.textContent="3m";lb.style.top=`calc(${linePos}% + 3px)`;
    halfEl.appendChild(ln);halfEl.appendChild(lb);
  }

  // ── Render interactive field ──
  const courtEdit=document.getElementById("courtEdit");
  const halfEdit=document.getElementById("halfEdit");

  function getEditRect(){ const r=courtEdit.getBoundingClientRect();return{w:r.width,h:r.height}; }

  function renderEditField(){
    halfEdit.querySelectorAll(".player,.three-meter,.three-meter-label").forEach(n=>n.remove());
    renderZones(halfEdit);
    render3mLine(halfEdit, 33.333);
    const {w,h}=getEditRect();
    for(const p of state.players){
      const el=document.createElement("div");el.className="player";
      el.dataset.playerId=p.id;el.title=`${badgeTop(p)}${p.name?" – "+p.name:""}`;
      el.innerHTML=`<div class="inner"><div class="topLine">${esc(badgeTop(p))}</div><div class="bottomLine">${esc(badgeBot(p))}</div></div>`;
      el.style.left=`${p2px(p.x,w)}px`;el.style.top=`${p2px(p.y,h)}px`;
      halfEdit.appendChild(el);
    }
  }

  // ── Render display field ──
  const courtDisplay=document.getElementById("courtDisplay");
  const halfDisplay=document.getElementById("halfDisplay");

  function getDisplayRect(){ const r=courtDisplay.getBoundingClientRect();return{w:r.width,h:r.height}; }

  function renderDisplayField(){
    halfDisplay.querySelectorAll(".player,.three-meter,.three-meter-label").forEach(n=>n.remove());
    renderZones(halfDisplay);
    render3mLine(halfDisplay, 33.333);

    const lbl=document.getElementById("displayLabel");
    if(!activeFormation){ lbl.style.display="block"; return; }
    lbl.style.display="none";

    const {w,h}=getDisplayRect();
    for(const p of activeFormation.players){
      // Merge current names/letters from state by position
      const live=state.players.find(sp=>sp.pos===p.pos);
      const displayP={...p, name:live?.name||p.name, letter:live?.letter||p.letter};
      const el=document.createElement("div");el.className="player display-player";
      el.title=`${badgeTop(displayP)}${displayP.name?" – "+displayP.name:""}`;
      el.innerHTML=`<div class="inner"><div class="topLine">${esc(badgeTop(displayP))}</div><div class="bottomLine">${esc(badgeBot(displayP))}</div></div>`;
      el.style.left=`${p2px(p.x,w)}px`;el.style.top=`${p2px(p.y,h)}px`;
      halfDisplay.appendChild(el);
    }
  }

  // ── Panel ──
  function renderPanel(){
    const mount=document.getElementById("teamCard");mount.innerHTML="";
    const act=document.createElement("div");act.className="team-actions";
    act.innerHTML=`<button class="btn">Rotation +1</button><button class="btn">Zurücksetzen</button>`;
    act.querySelectorAll("button")[0].addEventListener("click",rotate);
    act.querySelectorAll("button")[1].addEventListener("click",resetSpots);
    mount.appendChild(act);
    const grid=document.createElement("div");grid.className="grid";
    state.players.slice().sort((a,b)=>a.pos-b.pos).forEach(p=>{
      const box=document.createElement("div");box.className="pedit";box.dataset.pid=p.id;
      const used=()=>{const u=new Set();state.players.forEach(op=>{if(op.id!==p.id&&op.name)u.add(op.name);});return u;};
      const opts=()=>NAMES.filter(n=>n===""||n===p.name||!used().has(n)).map(n=>`<option value="${esc(n)}" ${p.name===n?"selected":""}>${esc(n||"—")}</option>`).join("");
      box.innerHTML=`<div class="top"><div class="miniBadge">${esc(badgeTop(p))}</div><div class="meta"><div class="p1">Pos ${p.pos}</div><div class="p2">${esc(p.name||"—")}</div></div></div>
        <div class="inputs">
          <select class="small letter">${LETTERS.map(v=>`<option value="${esc(v)}" ${p.letter===v?"selected":""}>${esc(v||"—")}</option>`).join("")}</select>
          <select class="small name">${opts()}</select>
        </div>`;
      const sl=box.querySelector(".letter"),sn=box.querySelector(".name");
      const upd=()=>{
        box.querySelector(".miniBadge").textContent=badgeTop(p);
        box.querySelector(".p2").textContent=p.name||"—";
        const chip=halfEdit.querySelector(`.player[data-player-id="${cssEsc(p.id)}"]`);
        if(chip){chip.querySelector(".topLine").textContent=badgeTop(p);chip.querySelector(".bottomLine").textContent=badgeBot(p);}
      };
      sl.addEventListener("change",()=>{p.letter=String(sl.value||"");save();upd();renderDisplayField();});
      sn.addEventListener("change",()=>{p.name=String(sn.value||"");save();upd();renderDisplayField();
        document.querySelectorAll(".pedit").forEach(ob=>{
          const osn=ob.querySelector(".name");if(!osn||ob===box)return;
          const oid=ob.dataset.pid;const op=state.players.find(p2=>p2.id===oid);if(!op)return;
          const u=new Set();state.players.forEach(x=>{if(x.id!==op.id&&x.name)u.add(x.name);});
          osn.innerHTML=NAMES.filter(n=>n===""||n===op.name||!u.has(n)).map(n=>`<option value="${esc(n)}" ${op.name===n?"selected":""}>${esc(n||"—")}</option>`).join("");
        });
      });
      grid.appendChild(box);
    });
    mount.appendChild(grid);
  }

  // ── Lib boxes ──
  const LIB_CONFIG = [
    {key:"grund",    mountId:"libBoxGrund"},
    {key:"annahme",  mountId:"libBoxAnnahme"},
    {key:"aufschlag",mountId:"libBoxAufschlag"},
  ];

  async function renderLibBox(key, mountEl){
    const titleEl=mountEl.querySelector(".lib-box-title");
    mountEl.innerHTML="";if(titleEl)mountEl.appendChild(titleEl);
    const lib=await loadLib(key);
    if(lib.length>0){
      const row=document.createElement("div");row.className="preset-row";
      lib.forEach(e=>{
        const wrap=document.createElement("span");wrap.style.cssText="display:inline-flex;align-items:center;gap:3px;";
        const btn=document.createElement("button");btn.className="preset-btn";btn.textContent=e.name;
        btn.addEventListener("click",()=>saveCurrentAndLoad(key,e.name));
        wrap.appendChild(btn);
        const del=document.createElement("button");
        del.style.cssText="border:none;background:none;cursor:pointer;font-size:11px;color:#e91e63;padding:0 2px;line-height:1;";
        del.textContent="✕";
        del.addEventListener("click",()=>{if(confirm(`„${e.name}" löschen?`)){deleteFromLib(key,e.name);}});
        wrap.appendChild(del);row.appendChild(wrap);
      });
      mountEl.appendChild(row);
    } else {
      const h=document.createElement("div");h.className="no-lib";h.textContent="Noch keine Aufstellungen gespeichert.";mountEl.appendChild(h);
    }
    const sr=document.createElement("div");sr.className="lib-save-row";
    const inp=document.createElement("input");inp.className="lib-name-input";inp.placeholder="Name…";inp.maxLength=40;
    const bSave=document.createElement("button");bSave.className="lib-btn save";bSave.textContent="💾 Speichern";
    bSave.addEventListener("mousedown",e=>e.preventDefault());
    bSave.addEventListener("click",()=>{if(inp.value.trim())saveToLib(key,inp.value);});
    inp.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();if(inp.value.trim())saveToLib(key,inp.value);}});
    sr.appendChild(inp);sr.appendChild(bSave);mountEl.appendChild(sr);
  }

  async function renderLibBoxes(){
    for(const {key,mountId} of LIB_CONFIG){
      await renderLibBox(key, document.getElementById(mountId));
    }
  }

  async function saveToLib(k,name){
    if(!name.trim())return;
    const lib=await loadLib(k);
    const entry={name:name.trim(),players:state.players.map(p=>({id:p.id,pos:p.pos,x:p.x,y:p.y,letter:p.letter,name:p.name}))};
    const idx=lib.findIndex(e=>e.name===entry.name);
    if(idx>=0)lib[idx]=entry;else lib.push(entry);
    await saveLib(k,lib);
    const cfg=LIB_CONFIG.find(c=>c.key===k);
    if(!cfg)return;
    const mountEl=document.getElementById(cfg.mountId);
    mountEl.querySelectorAll(".preset-row,.no-lib").forEach(n=>n.remove());
    const row=document.createElement("div");row.className="preset-row";
    lib.forEach(e=>{
      const wrap=document.createElement("span");wrap.style.cssText="display:inline-flex;align-items:center;gap:3px;";
      const btn=document.createElement("button");btn.className="preset-btn";btn.textContent=e.name;
      btn.addEventListener("click",()=>saveCurrentAndLoad(k,e.name));
      wrap.appendChild(btn);
      const del=document.createElement("button");
      del.style.cssText="border:none;background:none;cursor:pointer;font-size:11px;color:#e91e63;padding:0 2px;line-height:1;";
      del.textContent="✕";
      del.addEventListener("click",()=>{if(confirm(`„${e.name}" löschen?`)){deleteFromLib(k,e.name);}});
      wrap.appendChild(del);row.appendChild(wrap);
    });
    const saveRow=mountEl.querySelector(".lib-save-row");
    mountEl.insertBefore(row,saveRow);
    const inp=mountEl.querySelector(".lib-name-input");if(inp)inp.value="";
  }

  // Load a lib entry into the display field
  async function saveCurrentAndLoad(k,name){
    const lib=await loadLib(k);
    const entry=lib.find(e=>e.name===name);if(!entry)return;
    // Switch to matching tab
    activeTab=k;
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("active",b.dataset.tab===k));
    activeFormation={name,players:entry.players};
    const tabLabels={grund:"Grundaufstellung",annahme:"Annahme",aufschlag:"Bei eigenem Aufschlag"};
    document.getElementById("displayTitle").textContent=`${tabLabels[k]} · ${name}`;
    document.getElementById("displayLabel").style.display="none";
    renderDisplayField();
  }

  async function deleteFromLib(k,name){
    const lib=await loadLib(k);await saveLib(k,lib.filter(e=>e.name!==name));
    await renderLibBox(k,document.getElementById(LIB_CONFIG.find(c=>c.key===k).mountId));
  }

  // ── Actions ──
  function updateUnlockUI(){
    const btn=document.getElementById("btnUnlock");
    if(state.unlocked){btn.textContent="🔓 Frei";btn.classList.add("unlock-active");courtEdit.classList.add("unlocked");}
    else{btn.textContent="🔒 Gesperrt";btn.classList.remove("unlock-active");courtEdit.classList.remove("unlocked");}
  }
  function rotate(){
    state.players=state.players.map(p=>{const np=ROT1[p.pos]??p.pos;const sp=spot(np);return{...p,pos:np,x:sp.x,y:sp.y};});
    save();renderEditField();renderPanel();
  }
  function resetSpots(){
    state.players=state.players.map(p=>{const sp=spot(p.pos);return{...p,x:sp.x,y:sp.y};});
    save();renderEditField();
  }
  function hardReset(){ state=defState();setTitle("");save();renderEditField();renderPanel(); }

  // ── Tab buttons ──
  document.querySelectorAll(".tab-btn").forEach(btn=>{
    btn.addEventListener("click",async ()=>{
      activeTab=btn.dataset.tab;
      document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("active",b===btn));
      // Try to reload current formation in new tab
      if(activeFormation){
        const lib=await loadLib(activeTab);
        const entry=lib.find(e=>e.name===activeFormation.name);
        if(entry){
          activeFormation={name:entry.name,players:entry.players};
          const tabLabels={grund:"Grundaufstellung",annahme:"Annahme",aufschlag:"Bei eigenem Aufschlag"};
          document.getElementById("displayTitle").textContent=`${tabLabels[activeTab]} · ${activeFormation.name}`;
        } else {
          activeFormation=null;
          document.getElementById("displayTitle").textContent="— Kein Eintrag für diesen Tab —";
        }
        renderDisplayField();
      }
    });
  });

  // ── Drag ──
  let drag=null;
  courtEdit.addEventListener("pointerdown",e=>{
    const t=e.target.closest(".player");if(!t)return;e.preventDefault();
    const p=state.players.find(p=>p.id===t.dataset.playerId);if(!p)return;
    const cr=courtEdit.getBoundingClientRect(),{w,h}=getEditRect();
    drag={id:p.id,ptr:e.pointerId,ox:p2px(p.x,w)-(e.clientX-cr.left),oy:p2px(p.y,h)-(e.clientY-cr.top)};
    t.classList.add("dragging");t.setPointerCapture(e.pointerId);
  });
  courtEdit.addEventListener("pointermove",e=>{
    if(!drag||e.pointerId!==drag.ptr)return;
    const p=state.players.find(p=>p.id===drag.id);if(!p)return;
    const cr=courtEdit.getBoundingClientRect(),{w,h}=getEditRect();
    const pad=window.innerWidth<980?30:36;
    const xpx=clamp(e.clientX-cr.left+drag.ox,pad,w-pad);
    const ypx=clamp(e.clientY-cr.top+drag.oy,pad,h-pad);
    let x=clamp(px2p(xpx,w),0,100),y=clamp(px2p(ypx,h),0,100);
    if(!state.unlocked){const c=applyC(p.pos,x,y,byPos(state.players));x=c.x;y=c.y;}
    p.x=x;p.y=y;
    const chip=halfEdit.querySelector(`.player[data-player-id="${cssEsc(p.id)}"]`);
    if(chip){chip.style.left=`${p2px(x,w)}px`;chip.style.top=`${p2px(y,h)}px`;}
    save();
  });
  courtEdit.addEventListener("pointerup",e=>{
    if(!drag||e.pointerId!==drag.ptr)return;
    halfEdit.querySelector(`.player[data-player-id="${cssEsc(drag.id)}"]`)?.classList.remove("dragging");
    drag=null;
  });
  courtEdit.addEventListener("pointercancel",()=>{drag=null;});

  // ── Buttons ──
  document.getElementById("btnUnlock").addEventListener("click",()=>{state.unlocked=!state.unlocked;save();updateUnlockUI();});
  document.getElementById("resetAll").addEventListener("click",hardReset);
  document.getElementById("rotA").addEventListener("click",rotate);
  document.getElementById("spotsA").addEventListener("click",resetSpots);
  window.addEventListener("resize",()=>{ renderEditField(); renderDisplayField(); });

  // ── Init ──
  async function init(){
    updateUnlockUI();
    renderEditField();
    renderPanel();
    await renderLibBoxes();
  }
  init();
})();
</script>
</body>
</html>
