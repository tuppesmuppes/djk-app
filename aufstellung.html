<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Volleyball Aufstellungen – einfache Version</title>
<style>
:root{
  --bg:#f5f5f7;
  --card:#ffffff;
  --line:#d7d7dd;
  --text:#111;
  --muted:#666;
  --red:#c62828;
  --blue:#1565c0;
  --green:#2e7d32;
  --shadow:0 10px 22px rgba(0,0,0,.08);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text)}
.app{max-width:1280px;margin:0 auto;padding:12px;display:grid;grid-template-columns:1.2fr .8fr;gap:12px}
@media(max-width:950px){.app{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:12px}
h1{font-size:22px;margin:0 0 4px;font-weight:900}.sub{font-size:13px;color:var(--muted);margin-bottom:10px}.runner{font-size:20px;font-weight:900;color:var(--red);min-height:28px;margin:4px 0 8px}
.court{position:relative;height:min(52vh,570px);min-height:390px;border:7px solid var(--blue);border-radius:8px;background:linear-gradient(#f8fbff,#f3f3f3);overflow:hidden;touch-action:none;user-select:none}
.court.small{height:min(42vh,470px);min-height:330px;margin-top:8px}.net{position:absolute;left:0;right:0;top:0;height:16px;border-bottom:2px solid var(--blue);background-image:repeating-linear-gradient(90deg,var(--blue) 0 4px,transparent 4px 14px),repeating-linear-gradient(0deg,var(--blue) 0 3px,transparent 3px 9px);z-index:1;pointer-events:none}.line3m{position:absolute;left:0;right:0;top:33.333%;height:5px;background:var(--blue);pointer-events:none}.zonev1,.zonev2,.zoneh{position:absolute;background:rgba(0,0,0,.07);pointer-events:none}.zonev1{left:33.333%;top:0;bottom:0;width:1px}.zonev2{left:66.666%;top:0;bottom:0;width:1px}.zoneh{left:0;right:0;top:50%;height:1px}.znum{position:absolute;width:33.333%;height:50%;display:flex;align-items:flex-end;justify-content:flex-end;padding:6px;font-weight:900;font-size:28px;color:rgba(0,0,0,.28);pointer-events:none}.player{position:absolute;transform:translate(-50%,-50%);width:92px;height:92px;border-radius:999px;background:#fff;border:6px solid var(--red);box-shadow:0 7px 16px rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;text-align:center;padding:8px;cursor:grab;touch-action:none;z-index:3}.player.front{border-width:9px}.player.dragging{z-index:10;cursor:grabbing;box-shadow:0 14px 30px rgba(0,0,0,.26)}.player.solution{cursor:default;opacity:.94}.topline{font-size:23px;font-weight:950;line-height:1}.bottomline{font-size:14px;font-weight:800;color:#333;line-height:1.05;margin-top:4px;word-break:break-word}.emptyHint{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-weight:900;color:rgba(0,0,0,.28);text-align:center;text-transform:uppercase;letter-spacing:.08em;pointer-events:none}.controls{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.btn{border:1px solid var(--line);background:#fff;border-radius:13px;padding:10px 12px;font-weight:850;cursor:pointer;box-shadow:0 5px 12px rgba(0,0,0,.06)}.btn.primary{background:#e3f2fd;border-color:#2196f3;color:#0d47a1}.btn.danger{border-color:#ef9a9a;color:#b71c1c}.btn:active{transform:translateY(1px)}.side{display:grid;gap:12px}.editgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}@media(min-width:1050px){.editgrid{grid-template-columns:repeat(3,minmax(0,1fr))}}.slot{border:1px solid var(--line);border-radius:14px;padding:8px}.slotTitle{font-weight:900;font-size:13px;margin-bottom:6px}.slot select{width:100%;margin-top:5px;border:1px solid var(--line);border-radius:10px;padding:7px;background:#fff}.boxTitle{font-weight:950;font-size:17px;margin-bottom:8px;color:var(--red)}.runnerRows{display:grid;gap:6px}.runnerRow{display:grid;grid-template-columns:78px 1fr 1fr;gap:6px;align-items:center}.runnerLabel{font-weight:900;font-size:13px}.miniBtn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:7px;font-weight:800;cursor:pointer;font-size:12px}.miniBtn.save{background:#e8f5e9;border-color:#66bb6a;color:#1b5e20}.miniBtn.load{background:#fff}.miniBtn.hasData.load{border-color:#2196f3;color:#0d47a1}.status{font-size:13px;color:var(--muted);min-height:20px;margin-top:8px}.activeInfo{font-weight:900;color:var(--red)}
</style>
</head>
<body>
<div class="app">
  <main class="card">
    <h1>Volleyball Aufstellungen</h1>
    <div class="sub">Einfache Version: Spielerinnen zuweisen · rotieren · oben verschieben · unten gespeicherte Lösung anzeigen</div>
    <div class="runner" id="runnerTitle"></div>
    <div class="court" id="editCourt"><div class="net"></div><div class="line3m"></div><div class="zonev1"></div><div class="zonev2"></div><div class="zoneh"></div></div>
    <div class="controls">
      <button class="btn primary" id="rotateBtn">Rotation +1</button>
      <button class="btn" id="resetSpotsBtn">Spielerinnen auf Feldpositionen zurücksetzen</button>
      <button class="btn danger" id="clearTeamBtn">Namen/Rollen löschen</button>
    </div>
    <div class="sub" style="margin-top:12px">Gespeicherte Lösung</div>
    <div class="activeInfo" id="solutionTitle">— keine Lösung gewählt —</div>
    <div class="court small" id="solutionCourt"><div class="net"></div><div class="line3m"></div><div class="zonev1"></div><div class="zonev2"></div><div class="zoneh"></div><div class="emptyHint">Lösung wählen</div></div>
  </main>
  <aside class="side">
    <section class="card">
      <div class="boxTitle">Spielerinnen</div>
      <div class="editgrid" id="playerEditor"></div>
    </section>
    <section class="card category" data-cat="grund">
      <div class="boxTitle">Grundaufstellung</div>
      <div class="runnerRows"></div>
    </section>
    <section class="card category" data-cat="annahme">
      <div class="boxTitle">Annahme</div>
      <div class="runnerRows"></div>
    </section>
    <section class="card category" data-cat="aufschlag">
      <div class="boxTitle">Bei eigenem Aufschlag</div>
      <div class="runnerRows"></div>
    </section>
    <section class="card">
      <div class="boxTitle">Daten</div>
      <button class="btn danger" id="clearSavedBtn">Alle gespeicherten Aufstellungen löschen</button>
      <div class="status" id="status"></div>
    </section>
  </aside>
</div>
<script>
(() => {
  "use strict";

  const LS_STATE = "vb_simple_state_v1";
  const LS_FORMATIONS = "vb_simple_formations_v1";
  const ROLES = ["", "Z", "A", "M", "D"];
  const NAMES = ["", "Alessa", "Alma", "Anna", "Elif", "Ella", "Emma", "Frida", "Greta", "Hannah", "Johanna", "Jule", "Malou", "Marie", "Milva", "Philippa", "Zeynep"];
  const SPOTS = {4:{x:20,y:22},3:{x:50,y:18},2:{x:80,y:22},5:{x:20,y:72},6:{x:50,y:80},1:{x:80,y:72}};
  const ROT_PLUS_1 = {1:6,6:5,5:4,4:3,3:2,2:1};
  const CAT_LABEL = {grund:"Grundaufstellung", annahme:"Annahme", aufschlag:"Bei eigenem Aufschlag"};

  const $ = sel => document.querySelector(sel);
  const $$ = sel => Array.from(document.querySelectorAll(sel));
  const esc = s => String(s ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
  const clamp = (n,a,b) => Math.max(a, Math.min(b, n));
  const p2px = (p, size) => p / 100 * size;
  const px2p = (px, size) => size ? px / size * 100 : 0;

  function defaultPlayers(){
    return [1,2,3,4,5,6].map(pos => ({ id:`slot-${pos}`, pos, role:"", name:"", x:SPOTS[pos].x, y:SPOTS[pos].y }));
  }
  function defaultState(){ return { players: defaultPlayers() }; }
  function loadJSON(key, fallback){
    try{ const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }catch{ return fallback; }
  }
  function saveJSON(key, value){ try{ localStorage.setItem(key, JSON.stringify(value)); }catch{} }

  let state = loadJSON(LS_STATE, defaultState());
  if(!state.players || state.players.length !== 6) state = defaultState();
  state.players.forEach((p,i) => {
    p.id = p.id || `slot-${i+1}`;
    p.pos = Number(p.pos) || i+1;
    p.role = p.role || "";
    p.name = p.name || "";
    const sp = SPOTS[p.pos] || {x:50,y:50};
    p.x = Number.isFinite(p.x) ? p.x : sp.x;
    p.y = Number.isFinite(p.y) ? p.y : sp.y;
  });

  let formations = loadJSON(LS_FORMATIONS, {});
  let activeSolution = null; // {cat, runner, formation}
  let drag = null;

  const editCourt = $("#editCourt");
  const solutionCourt = $("#solutionCourt");

  function persistState(){ saveJSON(LS_STATE, state); }
  function persistFormations(){ saveJSON(LS_FORMATIONS, formations); }
  function courtSize(el){ const r = el.getBoundingClientRect(); return {w:r.width, h:r.height}; }
  function playerLabel(p){ return `${p.role || ""}${p.pos}`; }
  function isFront(pos){ return [2,3,4].includes(Number(pos)); }
  function playerAtPos(pos){ return state.players.find(p => Number(p.pos) === Number(pos)); }

  function drawZoneNumbers(court){
    court.querySelectorAll(".znum").forEach(n => n.remove());
    const zones = [{n:4,c:0,r:0},{n:3,c:1,r:0},{n:2,c:2,r:0},{n:5,c:0,r:1},{n:6,c:1,r:1},{n:1,c:2,r:1}];
    for(const z of zones){
      const el = document.createElement("div");
      el.className = "znum";
      el.textContent = z.n;
      el.style.left = `${z.c * 100 / 3}%`;
      el.style.top = `${z.r * 100 / 2}%`;
      court.appendChild(el);
    }
  }

  function renderRunnerTitle(){
    const z = state.players.find(p => p.role === "Z");
    $("#runnerTitle").textContent = z ? `Aktuell: Läufer ${z.pos}` : "Keine Zuspielerin (Z) zugewiesen";
  }

  function makeChip(p, mode){
    const el = document.createElement("div");
    el.className = `player ${isFront(p.pos) ? "front" : ""} ${mode === "solution" ? "solution" : ""}`;
    el.dataset.id = p.id || "";
    el.innerHTML = `<div><div class="topline">${esc(playerLabel(p))}</div><div class="bottomline">${esc(p.name)}</div></div>`;
    el.title = `${playerLabel(p)}${p.name ? " – " + p.name : ""}`;
    return el;
  }

  function renderEditCourt(){
    editCourt.querySelectorAll(".player,.znum").forEach(n => n.remove());
    drawZoneNumbers(editCourt);
    const {w,h} = courtSize(editCourt);
    for(const p of state.players){
      const el = makeChip(p, "edit");
      el.style.left = `${p2px(p.x, w)}px`;
      el.style.top = `${p2px(p.y, h)}px`;
      editCourt.appendChild(el);
    }
  }

  function renderSolutionCourt(){
    solutionCourt.querySelectorAll(".player,.znum").forEach(n => n.remove());
    drawZoneNumbers(solutionCourt);
    const hint = solutionCourt.querySelector(".emptyHint");
    if(!activeSolution){
      hint.style.display = "block";
      $("#solutionTitle").textContent = "— keine Lösung gewählt —";
      return;
    }
    hint.style.display = "none";
    const {cat, runner, formation} = activeSolution;
    $("#solutionTitle").textContent = `${CAT_LABEL[cat]} · Läufer ${runner}`;
    const {w,h} = courtSize(solutionCourt);

    for(const item of formation.players){
      const live = playerAtPos(item.pos);
      const p = {
        id: live?.id || `pos-${item.pos}`,
        pos: item.pos,
        role: live?.role || "",
        name: live?.name || "",
        x: item.x,
        y: item.y
      };
      const el = makeChip(p, "solution");
      el.style.left = `${p2px(p.x, w)}px`;
      el.style.top = `${p2px(p.y, h)}px`;
      solutionCourt.appendChild(el);
    }
  }

  function renderEditor(){
    const box = $("#playerEditor");
    box.innerHTML = "";
    for(const p of [...state.players].sort((a,b)=>a.pos-b.pos)){
      const el = document.createElement("div");
      el.className = "slot";
      el.innerHTML = `<div class="slotTitle">${esc(playerLabel(p))} ${p.name ? "· " + esc(p.name) : ""}</div>
        <select class="roleSel">${ROLES.map(r => `<option value="${esc(r)}" ${p.role===r?"selected":""}>${esc(r || "Rolle —")}</option>`).join("")}</select>
        <select class="nameSel">${NAMES.map(n => `<option value="${esc(n)}" ${p.name===n?"selected":""}>${esc(n || "Name —")}</option>`).join("")}</select>`;
      const roleSel = el.querySelector(".roleSel");
      const nameSel = el.querySelector(".nameSel");
      roleSel.addEventListener("change", () => { p.role = roleSel.value; persistState(); renderAll(); });
      nameSel.addEventListener("change", () => { p.name = nameSel.value; persistState(); renderAll(); });
      box.appendChild(el);
    }
  }

  function formationKey(cat, runner){ return `${cat}:${runner}`; }
  function hasFormation(cat, runner){ return Boolean(formations[formationKey(cat, runner)]); }
  function saveFormation(cat, runner){
    formations[formationKey(cat, runner)] = {
      players: state.players.map(p => ({ pos:p.pos, x:p.x, y:p.y }))
    };
    persistFormations();
    activeSolution = {cat, runner, formation: formations[formationKey(cat, runner)]};
    status(`Gespeichert: ${CAT_LABEL[cat]} · Läufer ${runner}`);
    renderAll();
  }
  function loadFormation(cat, runner){
    const formation = formations[formationKey(cat, runner)];
    if(!formation){ status(`Noch nicht gespeichert: ${CAT_LABEL[cat]} · Läufer ${runner}`); return; }
    activeSolution = {cat, runner, formation};
    status(`Geladen: ${CAT_LABEL[cat]} · Läufer ${runner}`);
    renderAll();
  }

  function renderCategoryBoxes(){
    $$(".category").forEach(catBox => {
      const cat = catBox.dataset.cat;
      const rows = catBox.querySelector(".runnerRows");
      rows.innerHTML = "";
      for(let runner=1; runner<=6; runner++){
        const row = document.createElement("div");
        row.className = "runnerRow";
        row.innerHTML = `<div class="runnerLabel">Läufer ${runner}</div>
          <button class="miniBtn load ${hasFormation(cat, runner) ? "hasData" : ""}">Anzeigen</button>
          <button class="miniBtn save">Speichern</button>`;
        row.querySelector(".load").addEventListener("click", () => loadFormation(cat, runner));
        row.querySelector(".save").addEventListener("click", () => saveFormation(cat, runner));
        rows.appendChild(row);
      }
    });
  }

  function rotate(){
    state.players = state.players.map(p => {
      const np = ROT_PLUS_1[p.pos] || p.pos;
      const sp = SPOTS[np];
      return {...p, pos:np, x:sp.x, y:sp.y};
    });
    persistState();
    renderAll();
  }

  function resetSpots(){
    state.players = state.players.map(p => {
      const sp = SPOTS[p.pos];
      return {...p, x:sp.x, y:sp.y};
    });
    persistState();
    renderAll();
  }

  function clearTeam(){
    if(!confirm("Namen und Rollen oben löschen? Gespeicherte Aufstellungen bleiben erhalten.")) return;
    state.players = state.players.map(p => ({...p, role:"", name:""}));
    persistState();
    renderAll();
  }

  function clearSaved(){
    if(!confirm("Alle gespeicherten Aufstellungen löschen?")) return;
    formations = {};
    activeSolution = null;
    persistFormations();
    status("Alle gespeicherten Aufstellungen gelöscht.");
    renderAll();
  }

  function status(msg){ $("#status").textContent = msg; }

  editCourt.addEventListener("pointerdown", e => {
    const chip = e.target.closest(".player");
    if(!chip) return;
    e.preventDefault();
    const p = state.players.find(x => x.id === chip.dataset.id);
    if(!p) return;
    const r = editCourt.getBoundingClientRect();
    const {w,h} = courtSize(editCourt);
    drag = {
      id:p.id,
      pointerId:e.pointerId,
      offsetX:p2px(p.x,w) - (e.clientX - r.left),
      offsetY:p2px(p.y,h) - (e.clientY - r.top)
    };
    chip.classList.add("dragging");
    chip.setPointerCapture(e.pointerId);
  });

  editCourt.addEventListener("pointermove", e => {
    if(!drag || e.pointerId !== drag.pointerId) return;
    const p = state.players.find(x => x.id === drag.id);
    if(!p) return;
    const r = editCourt.getBoundingClientRect();
    const {w,h} = courtSize(editCourt);
    p.x = clamp(px2p(e.clientX - r.left + drag.offsetX, w), 7, 93);
    p.y = clamp(px2p(e.clientY - r.top + drag.offsetY, h), 8, 94);
    const chip = editCourt.querySelector(`.player[data-id="${CSS.escape(p.id)}"]`);
    if(chip){ chip.style.left = `${p2px(p.x,w)}px`; chip.style.top = `${p2px(p.y,h)}px`; }
  });

  function finishDrag(e){
    if(!drag || (e.pointerId && e.pointerId !== drag.pointerId)) return;
    editCourt.querySelector(`.player[data-id="${CSS.escape(drag.id)}"]`)?.classList.remove("dragging");
    drag = null;
    persistState();
  }
  editCourt.addEventListener("pointerup", finishDrag);
  editCourt.addEventListener("pointercancel", finishDrag);

  $("#rotateBtn").addEventListener("click", rotate);
  $("#resetSpotsBtn").addEventListener("click", resetSpots);
  $("#clearTeamBtn").addEventListener("click", clearTeam);
  $("#clearSavedBtn").addEventListener("click", clearSaved);
  window.addEventListener("resize", () => { renderEditCourt(); renderSolutionCourt(); });

  function renderAll(){
    renderRunnerTitle();
    renderEditCourt();
    renderSolutionCourt();
    renderEditor();
    renderCategoryBoxes();
  }

  renderAll();
})();
</script>
</body>
</html>
