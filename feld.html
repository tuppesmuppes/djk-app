<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Volleyball Spielfeld</title>
  <style>
    :root{ --bg:#f5f5f5; --card:#fff; --red:#CC0000; --green:#2e7d32; --blue:#1565c0; --line:rgba(0,0,0,.12); --muted:#888; }
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{ font-family:system-ui,sans-serif; background:var(--bg); color:#111; }
    .wrap{ max-width:1300px; margin:0 auto; padding:12px; display:grid; grid-template-columns:1.3fr .7fr; gap:14px; align-items:start; }
    @media(max-width:900px){ .wrap{ grid-template-columns:1fr; } }

    .card{ background:var(--card); border-radius:16px; box-shadow:0 8px 20px rgba(0,0,0,.07); padding:12px; border:1px solid var(--line); }
    .app-title{ font-size:22px; font-weight:900; margin-bottom:2px; }
    .app-title span{ color:var(--red); }
    .subtitle{ font-size:12px; color:var(--muted); margin-top:2px; margin-bottom:10px; }

    /* Full court */
    .court{ position:relative; width:100%; border-radius:6px; border:6px solid var(--blue); overflow:hidden;
      background:linear-gradient(180deg,#f0f8ff,#f5f5f5); touch-action:none; user-select:none;
      height:min(78vh,820px); }
    @media(max-width:900px){ .court{ height:74vh; } }

    .net{ position:absolute; left:0; right:0; top:50%; height:6px; background:var(--blue); z-index:2; pointer-events:none; transform:translateY(-3px); }
    .net-mesh{ position:absolute; left:0; right:0; top:calc(50% - 10px); height:7px; z-index:2; pointer-events:none;
      background-image:repeating-linear-gradient(90deg,var(--blue) 0,var(--blue) 4px,transparent 4px,transparent 14px); }
    .three-m-top{ position:absolute; left:0; right:0; height:5px; background:var(--blue); top:calc(50% - 16.667%); pointer-events:none; z-index:1; }
    .three-m-bot{ position:absolute; left:0; right:0; height:5px; background:var(--blue); top:calc(50% + 16.667%); pointer-events:none; z-index:1; }
    .three-m-lbl{ position:absolute; right:5px; font-size:10px; font-weight:800; color:var(--blue); pointer-events:none; }
    .lbl-top{ top:calc(50% - 16.667% + 4px); }
    .lbl-bot{ top:calc(50% + 16.667% + 4px); }

    .zones{ position:absolute; inset:0; pointer-events:none; }
    .zone-line-v{ position:absolute; top:0; bottom:0; width:1px; background:rgba(0,0,0,.07); }
    .zone-line-h{ position:absolute; left:0; right:0; height:1px; background:rgba(0,0,0,.07); }
    .zone-num{ position:absolute; font-size:min(2.6vw,22px); font-weight:900; color:rgba(0,0,0,.16); display:flex; align-items:flex-end; justify-content:flex-end; padding:0 6px 4px 0; }

    .chip{ position:absolute; transform:translate(-50%,-50%); border-radius:999px; background:#fff;
      display:flex; align-items:center; justify-content:center; text-align:center; line-height:1.1;
      box-shadow:0 6px 14px rgba(0,0,0,.14); border:6px solid var(--red); cursor:grab; touch-action:none; z-index:3; }
    .chip.team-b{ border-color:var(--green); }
    .chip.front{ border-width:9px; }
    .chip .pname{ font-weight:800; font-size:min(2.2vw,18px); }
    @media(max-width:900px){ .chip .pname{ font-size:min(3.6vw,15px); } }
    .chip.dragging{ cursor:grabbing; box-shadow:0 12px 24px rgba(0,0,0,.2); z-index:10; }

    .btn-row{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .btn{ -webkit-appearance:none; appearance:none; border:1px solid var(--line); background:#fff; padding:10px 14px; border-radius:12px; font-weight:800; font-size:13px; cursor:pointer; box-shadow:0 4px 10px rgba(0,0,0,.07); }
    .btn:active{ transform:translateY(1px); }
    .btn.red{ border-color:var(--red); color:var(--red); }
    .btn.green{ border-color:var(--green); color:var(--green); }

    /* Right panel */
    .panel{ display:grid; gap:12px; }
    .team-card .team-title{ font-size:16px; font-weight:900; margin-bottom:8px; }
    .team-card.a .team-title{ color:var(--red); }
    .team-card.b .team-title{ color:var(--green); }
    .name-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
    .name-cell{ border:1px solid var(--line); border-radius:12px; padding:8px; }
    .name-cell .pos-label{ font-size:11px; font-weight:700; color:var(--muted); margin-bottom:4px; }
    .name-sel{ width:100%; padding:7px 8px; border-radius:10px; border:1px solid var(--line); font-size:13px; background:#fff; outline:none; }
  </style>
</head>
<body>
<div style="background:var(--red);height:5px;"></div>
<div class="wrap">

  <!-- Left: full court -->
  <div class="card">
    <div class="app-title">Volleyball <span>Spielfeld</span></div>
    <div class="subtitle">Drag &amp; Drop · Rotation +1 pro Team</div>

    <div class="court" id="court">
      <div class="net"></div>
      <div class="net-mesh"></div>
      <div id="field"></div>
    </div>
  </div>

  <!-- Right: name panels -->
  <div class="panel">
    <div class="card team-card a">
      <div class="team-title">Team A (rot)</div>
      <div class="name-grid" id="gridA"></div>
      <div class="btn-row">
        <button class="btn red" id="rotA">Rotation +1</button>
        <button class="btn" id="resetA">Zurücksetzen</button>
      </div>
    </div>
    <div class="card team-card b">
      <div class="team-title">Team B (grün)</div>
      <div class="name-grid" id="gridB"></div>
      <div class="btn-row">
        <button class="btn green" id="rotB">Rotation +1</button>
        <button class="btn" id="resetB">Zurücksetzen</button>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
'use strict';

const LS_KEY = "vb_field_v2";

const ROT = {1:6, 2:1, 3:2, 4:3, 5:4, 6:5}; // rotation +1: pos→new pos

// Team A occupies bottom half (y 50-100), Team B occupies top half (y 0-50)
// Net at y=50. Front row (attack zone) = 1/3 of half near net, back row = 2/3 of half
// Team A (bottom half): front row near net (y~58), back row (y~83)
const DEFAULT_XY_A = {
  4:{x:17,y:58}, 3:{x:50,y:58}, 2:{x:83,y:58},
  5:{x:17,y:83}, 6:{x:50,y:83}, 1:{x:83,y:83}
};
// Team B (top half): mirrored - front row near net (y~42), back row (y~17)
const DEFAULT_XY_B = {
  4:{x:83,y:42}, 3:{x:50,y:42}, 2:{x:17,y:42},
  5:{x:83,y:17}, 6:{x:50,y:17}, 1:{x:17,y:17}
};

const NAMES = ["","Alessa","Alma","Anna","Elif","Ella","Emma","Frida","Greta","Hannah",
  "Johanna","Jule","Malou","Marie","Milva","Philippa","Zeynep"];

const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const cssEsc = s => CSS.escape(String(s));
const p2px = (p,s) => (p/100)*s;
const px2p = (px,s) => s===0?0:(px/s)*100;
const clamp = (n,a,b) => Math.max(a,Math.min(b,n));

function defTeam(team, xyMap){
  return [1,2,3,4,5,6].map(pos => ({
    id: `${team}${pos}`,
    team,
    name: "",
    pos,
    x: xyMap[pos].x,
    y: xyMap[pos].y,
  }));
}
function defState(){
  return { v:2, playersA: defTeam('A',DEFAULT_XY_A), playersB: defTeam('B',DEFAULT_XY_B) };
}
function loadState(){
  try{
    const r=localStorage.getItem(LS_KEY);
    if(!r)return null;
    const s=JSON.parse(r);
    if(!s||s.v!==2)return null;
    [...s.playersA,...s.playersB].forEach(p=>{ if(p.name===undefined)p.name=""; });
    return s;
  }catch{return null;}
}
let state = loadState() || defState();
const save = () => { try{localStorage.setItem(LS_KEY,JSON.stringify(state));}catch{} };

const court = document.getElementById("court");
const field = document.getElementById("field");

function getRect(){ const r=court.getBoundingClientRect(); return {w:r.width,h:r.height}; }

function renderZones(){
  field.querySelectorAll(".zones").forEach(n=>n.remove());
  const z=document.createElement("div"); z.className="zones";
  // vertical lines for both halves
  const v1=document.createElement("div"); v1.className="zone-line-v"; v1.style.left="33.333%";
  const v2=document.createElement("div"); v2.className="zone-line-v"; v2.style.left="66.666%";
  z.appendChild(v1); z.appendChild(v2);
  // horizontal lines at the 3m lines (1/3 of each half from net)
  const h1=document.createElement("div"); h1.className="zone-line-h"; h1.style.top="33.333%";
  const h2=document.createElement("div"); h2.className="zone-line-h"; h2.style.top="66.666%";
  z.appendChild(h1); z.appendChild(h2);

  // Zone numbers: Team B top half (0-50%), Team A bottom half (50-100%)
  // Attack zone (front row) = 1/3 of half nearest net, defense zone (back row) = 2/3 of half
  const bFront=[[4,2],[3,1],[2,0]]; // front row near net = bottom third of top half (33.3-50%)
  const bBack=[[5,2],[6,1],[1,0]];  // back row = top two-thirds (0-33.3%)
  bFront.forEach(([n,c])=>{
    const d=document.createElement("div"); d.className="zone-num";
    d.style.left=`${c*100/3}%`; d.style.top="33.333%"; d.style.width=`${100/3}%`; d.style.height="16.667%";
    d.textContent=n; z.appendChild(d);
  });
  bBack.forEach(([n,c])=>{
    const d=document.createElement("div"); d.className="zone-num";
    d.style.left=`${c*100/3}%`; d.style.top="0%"; d.style.width=`${100/3}%`; d.style.height="33.333%";
    d.textContent=n; z.appendChild(d);
  });
  // Team A (bottom half): front row near net (50-66.7%), back row (66.7-100%)
  const aFront=[[4,0],[3,1],[2,2]];
  const aBack=[[5,0],[6,1],[1,2]];
  aFront.forEach(([n,c])=>{
    const d=document.createElement("div"); d.className="zone-num";
    d.style.left=`${c*100/3}%`; d.style.top="50%"; d.style.width=`${100/3}%`; d.style.height="16.667%";
    d.textContent=n; z.appendChild(d);
  });
  aBack.forEach(([n,c])=>{
    const d=document.createElement("div"); d.className="zone-num";
    d.style.left=`${c*100/3}%`; d.style.top="66.666%"; d.style.width=`${100/3}%`; d.style.height="33.333%";
    d.textContent=n; z.appendChild(d);
  });
  field.appendChild(z);
}

function renderField(){
  field.querySelectorAll(".chip,.three-m-top,.three-m-bot,.three-m-lbl").forEach(n=>n.remove());
  renderZones();

  const t1=document.createElement("div"); t1.className="three-m-top";
  const t2=document.createElement("div"); t2.className="three-m-bot";
  const l1=document.createElement("div"); l1.className="three-m-lbl lbl-top"; l1.textContent="3m";
  const l2=document.createElement("div"); l2.className="three-m-lbl lbl-bot"; l2.textContent="3m";
  field.appendChild(t1); field.appendChild(t2); field.appendChild(l1); field.appendChild(l2);

  const {w,h}=getRect();
  const size=Math.min(w,h)*0.24;

  [...state.playersA,...state.playersB].forEach(p=>{
    const isFront=[2,3,4].includes(p.pos);
    const el=document.createElement("div");
    el.className="chip"+(p.team==='B'?' team-b':'')+(isFront?' front':'');
    el.dataset.id=p.id;
    el.style.cssText=`width:${size}px;height:${size}px;left:${p2px(p.x,w)}px;top:${p2px(p.y,h)}px;`;
    el.innerHTML=`<div class="pname">${esc(p.name)}</div>`;
    field.appendChild(el);
  });
}

function renderNameGrid(team, players, mountId, rotFn, resetFn){
  const grid=document.getElementById(mountId);
  grid.innerHTML="";
  players.slice().sort((a,b)=>a.pos-b.pos).forEach(p=>{
    const cell=document.createElement("div"); cell.className="name-cell"; cell.dataset.id=p.id;
    const used=new Set(players.filter(x=>x.id!==p.id&&x.name).map(x=>x.name));
    const opts=NAMES.filter(n=>n===""||n===p.name||!used.has(n))
      .map(n=>`<option value="${esc(n)}">${n||"—"}</option>`).join("");
    cell.innerHTML=`<div class="pos-label">Pos ${p.pos}</div><select class="name-sel">${opts}</select>`;
    const sel=cell.querySelector("select");
    sel.value=p.name||"";
    sel.addEventListener("change",()=>{
      p.name=sel.value; save();
      const chip=field.querySelector(`.chip[data-id="${cssEsc(p.id)}"]`);
      if(chip) chip.querySelector(".pname").textContent=p.name;
      grid.querySelectorAll(".name-cell").forEach(other=>{
        if(other===cell)return;
        const oid=other.dataset.id;
        const op=players.find(x=>x.id===oid); if(!op)return;
        const otherSel=other.querySelector("select");
        const curVal=otherSel.value;
        const usedN=new Set(players.filter(x=>x.id!==op.id&&x.name).map(x=>x.name));
        otherSel.innerHTML=NAMES.filter(n=>n===""||n===op.name||!usedN.has(n))
          .map(n=>`<option value="${esc(n)}">${n||"—"}</option>`).join("");
        otherSel.value=curVal;
      });
    });
    grid.appendChild(cell);
  });
}

function rotateTeam(players, xyMap){
  players.forEach(p=>{
    const newPos=ROT[p.pos];
    p.pos=newPos; p.x=xyMap[newPos].x; p.y=xyMap[newPos].y;
  });
  save(); renderField(); renderAllGrids();
}
function resetTeam(players, xyMap){
  players.forEach(p=>{ p.x=xyMap[p.pos].x; p.y=xyMap[p.pos].y; });
  save(); renderField();
}

function renderAllGrids(){
  renderNameGrid('A', state.playersA, 'gridA');
  renderNameGrid('B', state.playersB, 'gridB');
}

// ── Drag ──
let drag=null;
court.addEventListener("pointerdown",e=>{
  const t=e.target.closest(".chip"); if(!t)return; e.preventDefault();
  const all=[...state.playersA,...state.playersB];
  const p=all.find(x=>x.id===t.dataset.id); if(!p)return;
  const cr=court.getBoundingClientRect();
  const {w,h}=getRect();
  drag={id:p.id,ptr:e.pointerId,ox:p2px(p.x,w)-(e.clientX-cr.left),oy:p2px(p.y,h)-(e.clientY-cr.top)};
  t.classList.add("dragging"); t.setPointerCapture(e.pointerId);
});
court.addEventListener("pointermove",e=>{
  if(!drag||e.pointerId!==drag.ptr)return;
  const all=[...state.playersA,...state.playersB];
  const p=all.find(x=>x.id===drag.id); if(!p)return;
  const cr=court.getBoundingClientRect();
  const {w,h}=getRect();
  p.x=clamp(px2p(e.clientX-cr.left+drag.ox,w),0,100);
  p.y=clamp(px2p(e.clientY-cr.top+drag.oy,h),0,100);
  const chip=field.querySelector(`.chip[data-id="${cssEsc(p.id)}"]`);
  if(chip){chip.style.left=`${p2px(p.x,w)}px`;chip.style.top=`${p2px(p.y,h)}px`;}
  save();
});
court.addEventListener("pointerup",e=>{
  if(!drag||e.pointerId!==drag.ptr)return;
  field.querySelector(`.chip[data-id="${cssEsc(drag.id)}"]`)?.classList.remove("dragging");
  drag=null;
});
court.addEventListener("pointercancel",()=>{ drag=null; });

// ── Buttons ──
document.getElementById("rotA").addEventListener("click",()=>rotateTeam(state.playersA,DEFAULT_XY_A));
document.getElementById("rotB").addEventListener("click",()=>rotateTeam(state.playersB,DEFAULT_XY_B));
document.getElementById("resetA").addEventListener("click",()=>resetTeam(state.playersA,DEFAULT_XY_A));
document.getElementById("resetB").addEventListener("click",()=>resetTeam(state.playersB,DEFAULT_XY_B));
window.addEventListener("resize",renderField);

// ── Init ──
renderField();
renderAllGrids();

})();
</script>
</body>
</html>
