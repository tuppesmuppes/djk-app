<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Volleyball Scoreboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f1e;
      --surface: #0f172a;
      --border: rgba(255,255,255,0.06);
      --text: #f8fafc;
      --muted: #475569;
      --dim: #1e293b;
      --green: #22c55e;
      --blue: #3b82f6;
      --amber: #f59e0b;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    /* ── MODE SCREEN ── */
    #mode-screen {
      width: 100vw; height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .mode-card {
      text-align: center;
      width: min(90vw, 420px);
    }
    .mode-card .ball { font-size: clamp(48px, 12vw, 80px); margin-bottom: 2vh; }
    .mode-card h1 {
      font-size: clamp(20px, 5vw, 32px); font-weight: 900;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text); margin-bottom: 1vh;
    }
    .mode-card p { color: var(--muted); font-size: clamp(13px, 3vw, 16px); margin-bottom: 4vh; }
    .mode-buttons { display: flex; flex-direction: column; gap: 2vh; }
    .mode-btn {
      display: flex; flex-direction: column; align-items: center; gap: 0.5vh;
      padding: clamp(14px, 3vh, 24px);
      border-radius: 16px; border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer; background: none; color: inherit;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .mode-btn:active { transform: scale(0.97); }
    .mode-btn.display { background: rgba(30,64,175,0.13); }
    .mode-btn.control { background: rgba(146,64,14,0.13); }
    .mode-btn .icon { font-size: clamp(28px, 7vw, 40px); }
    .mode-btn .label { font-size: clamp(16px, 4vw, 20px); font-weight: 700; }
    .mode-btn .desc  { font-size: clamp(11px, 2.5vw, 14px); color: var(--muted); }

    /* ── MAIN APP ── */
    #app {
      width: 100vw; height: 100vh;
      background: linear-gradient(160deg, #0a0f1e 0%, #0f172a 50%, #0a1628 100%);
      display: none; flex-direction: column;
    }
    #app.visible { display: flex; }

    /* Top bar */
    #topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.5vh 3vw;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tb-title { font-size: clamp(11px, 2.5vw, 15px); font-weight: 800; letter-spacing: 0.15em; color: var(--muted); }
    .tb-set-badge {
      font-size: clamp(11px, 2.5vw, 14px); font-weight: 700; letter-spacing: 0.1em;
      padding: 0.4vh 1.2vw; border-radius: 20px;
    }
    .tb-set-badge.playing { color: var(--amber); background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); }
    .tb-set-badge.over    { color: var(--green); background: rgba(34,197,94,0.1);  border: 1px solid rgba(34,197,94,0.2); }
    #sync-dot {
      font-size: clamp(10px, 2vw, 13px); font-weight: 700;
      padding: 0.4vh 1.2vw; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* Score area */
    #score-area {
      flex: 1; display: flex; align-items: stretch; overflow: hidden;
    }
    .team-col {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: space-evenly;
      padding: 1vh 2vw;
      transition: background 0.4s;
    }
    .team-col.flash-green { background: rgba(34,197,94,0.07); }
    .team-col.flash-blue  { background: rgba(59,130,246,0.07); }

    .team-name {
      font-size: clamp(16px, 4vw, 28px); font-weight: 900;
      letter-spacing: 0.06em; color: #e2e8f0; text-transform: uppercase;
      display: flex; align-items: center; gap: 6px;
    }
    .team-name .edit-hint { font-size: 0.6em; color: var(--muted); font-weight: 400; }
    .team-name.editable { cursor: pointer; }

    .name-edit { display: flex; gap: 8px; align-items: center; }
    .name-input {
      background: var(--dim); border: 1px solid var(--blue); border-radius: 8px;
      color: var(--text); font-size: clamp(14px, 3vw, 18px);
      padding: 6px 10px; width: clamp(90px, 20vw, 160px); outline: none;
    }
    .name-save {
      background: var(--green); border: none; border-radius: 8px;
      color: #fff; font-size: 18px; padding: 6px 12px; cursor: pointer;
    }

    .score-num {
      font-size: clamp(140px, 28vw, 460px);
      font-weight: 900; line-height: 1;
      color: var(--text);
      text-shadow: 0 0 60px rgba(255,255,255,0.1);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .set-num {
      font-size: clamp(36px, 8vw, 80px);
      font-weight: 900;
      letter-spacing: 0.05em;
      color: rgba(255,255,255,0.15);
      transition: color 0.3s, text-shadow 0.3s;
      font-variant-numeric: tabular-nums;
    }
    .set-num.won-green { color: var(--green); text-shadow: 0 0 20px rgba(34,197,94,0.5); }
    .set-num.won-blue  { color: var(--blue);  text-shadow: 0 0 20px rgba(59,130,246,0.5); }

    .controls { display: flex; gap: 2vw; margin-top: 1vh; }
    .btn-minus, .btn-plus {
      width: clamp(56px, 13vw, 88px); height: clamp(56px, 13vw, 88px);
      border-radius: 50%; font-weight: 700; cursor: pointer;
      font-size: clamp(24px, 6vw, 44px);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s;
    }
    .btn-minus:active, .btn-plus:active { transform: scale(0.92); }
    .btn-minus {
      border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04);
      color: #94a3b8;
    }
    .btn-plus-a {
      border: none; background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff; box-shadow: 0 4px 20px rgba(34,197,94,0.35);
    }
    .btn-plus-b {
      border: none; background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff; box-shadow: 0 4px 20px rgba(59,130,246,0.35);
    }

    /* Divider */
    .divider {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 2vh; padding: 0 1vw; flex-shrink: 0;
    }
    .div-line { width: 1px; flex: 1; background: rgba(255,255,255,0.05); }
    .div-colon { font-size: clamp(28px, 6vw, 56px); font-weight: 900; color: var(--dim); line-height: 1; }

    /* Bottom bar */
    #bottombar {
      flex-shrink: 0; border-top: 1px solid var(--border);
      padding: 1vh 3vw; display: flex;
      align-items: center; justify-content: space-between; gap: 2vw;
    }
    #history { display: flex; gap: 2vw; align-items: center; flex-wrap: wrap; }
    .history-empty { font-size: clamp(10px, 2vw, 13px); color: #334155; }
    .history-set { font-size: clamp(11px, 2.5vw, 15px); color: #64748b; }
    .history-set .win  { font-weight: 700; }
    .history-set .lose { font-weight: 700; color: #94a3b8; }
    #winner-text { font-size: clamp(11px, 2.5vw, 15px); color: var(--green); font-weight: 700; }

    #btn-reset {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; color: #94a3b8;
      font-size: clamp(11px, 2.5vw, 14px); font-weight: 600;
      padding: 0.6vh 1.5vw; cursor: pointer; white-space: nowrap;
      display: none;
    }
    #btn-reset:active { background: rgba(255,255,255,0.08); }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- MODE SCREEN -->
<div id="mode-screen">
  <div class="mode-card">
    <div class="ball">🏐</div>
    <h1>Volleyball</h1>
    <p>Modus für dieses Gerät wählen</p>
    <div class="mode-buttons">
      <button class="mode-btn display" onclick="chooseMode('display')">
        <span class="icon">📺</span>
        <span class="label">Anzeigetafel</span>
        <span class="desc">Zeigt den Spielstand an</span>
      </button>
      <button class="mode-btn control" onclick="chooseMode('control')">
        <span class="icon">🎮</span>
        <span class="label">Steuerung</span>
        <span class="desc">Punkte eintragen &amp; verwalten</span>
      </button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">

  <!-- Top bar -->
  <div id="topbar">
    <span class="tb-title">🏐 VOLLEYBALL</span>
    <span id="set-badge" class="tb-set-badge playing">SATZ 1 / 3</span>
    <span id="sync-dot">●</span>
  </div>

  <!-- Score area -->
  <div id="score-area">

    <!-- Team A -->
    <div class="team-col" id="col-a">
      <div id="name-a-display" class="team-name editable" onclick="startEditName('a')">
        <span id="name-a-text">Team A</span>
        <span class="edit-hint" id="edit-hint-a">✎</span>
      </div>
      <div id="name-a-edit" class="name-edit hidden">
        <input class="name-input" id="name-a-input" onkeydown="nameKeydown(event,'a')" />
        <button class="name-save" onclick="saveName('a')">✓</button>
      </div>
      <div class="score-num" id="score-a">0</div>
      <div id="sets-a" class="set-num">0</div>
      <div class="controls" id="controls-a">
        <button class="btn-minus" onclick="removePoint('a')">−</button>
        <button class="btn-plus btn-plus-a" onclick="addPoint('a')">+</button>
      </div>
    </div>

    <!-- Divider -->
    <div class="divider">
      <div class="div-line"></div>
      <div class="div-colon">:</div>
      <div class="div-line"></div>
    </div>

    <!-- Team B -->
    <div class="team-col" id="col-b">
      <div id="name-b-display" class="team-name editable" onclick="startEditName('b')">
        <span id="name-b-text">Team B</span>
        <span class="edit-hint" id="edit-hint-b">✎</span>
      </div>
      <div id="name-b-edit" class="name-edit hidden">
        <input class="name-input" id="name-b-input" onkeydown="nameKeydown(event,'b')" />
        <button class="name-save" onclick="saveName('b')">✓</button>
      </div>
      <div class="score-num" id="score-b">0</div>
      <div id="sets-b" class="set-num">0</div>
      <div class="controls" id="controls-b">
        <button class="btn-minus" onclick="removePoint('b')">−</button>
        <button class="btn-plus btn-plus-b" onclick="addPoint('b')">+</button>
      </div>
    </div>

  </div><!-- /score-area -->

  <!-- Bottom bar -->
  <div id="bottombar">
    <div id="history"><span class="history-empty">Noch kein Satz gespielt</span></div>
    <div style="display:flex;gap:2vw;align-items:center;flex-shrink:0">
      <button id="btn-reset" onclick="resetGame()">↺ Neu</button>
    </div>
  </div>

</div><!-- /app -->

<script>
  const API_KEY = "$2a$10$wa5cRNFQu8JA4EZAHpz3qOVTEF6asziZ9d2bK16ncgRUXg2GsS2B2";
  const BIN_ID  = "69fcbfa5250b1311c319c4d8";
  const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

  let mode = null;
  let pollTimer = null;
  let state = null;

  const initialState = () => ({
    scoreA: 0, scoreB: 0,
    setsA: 0, setsB: 0,
    setHistory: [],
    gameOver: false, winner: null,
    teamA: "Team A", teamB: "Team B",
  });

  // ── API ────────────────────────────────────────────────────────
  async function fetchState() {
    const res = await fetch(BIN_URL + "/latest", {
      headers: { "X-Master-Key": API_KEY, "X-Bin-Meta": "false" },
    });
    if (!res.ok) throw new Error("fetch " + res.status);
    return res.json();
  }

  async function pushState(s) {
    const res = await fetch(BIN_URL, {
      method: "PUT",
      headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
      body: JSON.stringify(s),
    });
    if (!res.ok) throw new Error("push " + res.status);
    return res.json();
  }

  // ── SYNC STATUS ────────────────────────────────────────────────
  function setSyncStatus(status) {
    const el = document.getElementById("sync-dot");
    const map = {
      ok:      { text: "● LIVE",    color: "#22c55e", bg: "rgba(34,197,94,0.1)",  border: "rgba(34,197,94,0.2)" },
      syncing: { text: "↻ SYNC",    color: "#f59e0b", bg: "rgba(245,158,11,0.1)", border: "rgba(245,158,11,0.2)" },
      error:   { text: "✕ OFFLINE", color: "#ef4444", bg: "rgba(239,68,68,0.1)",  border: "rgba(239,68,68,0.2)" },
    };
    const s = map[status] || map.error;
    el.textContent = s.text;
    el.style.color = s.color;
    el.style.background = s.bg;
    el.style.border = `1px solid ${s.border}`;
    el.style.fontSize = "clamp(10px, 2vw, 12px)";
    el.style.fontWeight = "700";
    el.style.letterSpacing = "0.08em";
    el.style.padding = "0.4vh 1.2vw";
    el.style.borderRadius = "20px";
  }

  // ── RENDER ─────────────────────────────────────────────────────
  function render(s) {
    const elA = document.getElementById("score-a");
    const elB = document.getElementById("score-b");
    elA.textContent = s.scoreA;
    elB.textContent = s.scoreB;

    // Red at 10 and 20
    const redA = s.scoreA === 10 || s.scoreA === 20;
    const redB = s.scoreB === 10 || s.scoreB === 20;
    elA.style.color = redA ? "#ef4444" : "";
    elA.style.textShadow = redA ? "0 0 40px rgba(239,68,68,0.4)" : "0 0 60px rgba(255,255,255,0.1)";
    elB.style.color = redB ? "#ef4444" : "";
    elB.style.textShadow = redB ? "0 0 40px rgba(239,68,68,0.4)" : "0 0 60px rgba(255,255,255,0.1)";

    document.getElementById("name-a-text").textContent = s.teamA;
    document.getElementById("name-b-text").textContent = s.teamB;

    // Set numbers
    const setsAEl = document.getElementById("sets-a");
    const setsBEl = document.getElementById("sets-b");
    setsAEl.textContent = s.setsA;
    setsBEl.textContent = s.setsB;
    setsAEl.className = "set-num" + (s.setsA > 0 ? " won-green" : "");
    setsBEl.className = "set-num" + (s.setsB > 0 ? " won-blue"  : "");

    // Set badge
    const badge = document.getElementById("set-badge");
    if (s.gameOver) {
      badge.textContent = "SPIEL BEENDET";
      badge.className = "tb-set-badge over";
    } else {
      badge.textContent = `SATZ ${s.setHistory.length + 1} / 3`;
      badge.className = "tb-set-badge playing";
    }

    // History
    const hist = document.getElementById("history");
    if (s.setHistory.length === 0) {
      hist.innerHTML = '<span class="history-empty">Noch kein Satz gespielt</span>';
    } else {
      hist.innerHTML = s.setHistory.map((h, i) => {
        const aW = h.a > h.b;
        return `<span class="history-set">S${i+1}: <span class="${aW?'win':'lose'}" style="color:${aW?'#22c55e':'#94a3b8'}">${h.a}</span><span style="color:#334155">–</span><span class="${!aW?'win':'lose'}" style="color:${!aW?'#3b82f6':'#94a3b8'}">${h.b}</span></span>`;
      }).join("") + (s.gameOver ? `<span id="winner-text">🏆 ${s.winner==="A"?s.teamA:s.teamB} gewinnt!</span>` : "");
    }
  }

  // ── FLASH ──────────────────────────────────────────────────────
  function flash(side) {
    const col = document.getElementById("col-" + side);
    const cls = side === "a" ? "flash-green" : "flash-blue";
    col.classList.add(cls);
    setTimeout(() => col.classList.remove(cls), 700);
  }

  // ── GAME LOGIC ─────────────────────────────────────────────────
  function checkSetWin(a, b) {
    if ((a >= 25 || b >= 25) && Math.abs(a - b) >= 2) return a > b ? "A" : "B";
    return null;
  }

  async function addPoint(side) {
    if (!state || state.gameOver) return;
    const s = { ...state, setHistory: [...state.setHistory] };
    if (side === "a") s.scoreA++; else s.scoreB++;

    const winner = checkSetWin(s.scoreA, s.scoreB);
    if (winner) {
      flash(side);
      s.setHistory.push({ a: s.scoreA, b: s.scoreB });
      if (winner === "A") s.setsA++; else s.setsB++;
      if (s.setsA === 2 || s.setsB === 2) {
        s.gameOver = true; s.winner = winner;
      } else {
        s.scoreA = 0; s.scoreB = 0;
      }
    } else {
      flash(side);
    }
    await saveAndRender(s);
  }

  async function removePoint(side) {
    if (!state || state.gameOver) return;
    const s = { ...state, setHistory: [...state.setHistory] };
    if (side === "a") s.scoreA = Math.max(0, s.scoreA - 1);
    else              s.scoreB = Math.max(0, s.scoreB - 1);
    await saveAndRender(s);
  }

  async function resetGame() {
    const s = initialState();
    s.teamA = state ? state.teamA : "Team A";
    s.teamB = state ? state.teamB : "Team B";
    await saveAndRender(s);
  }

  async function saveAndRender(s) {
    state = s;
    render(s);
    setSyncStatus("syncing");
    try {
      await pushState(s);
      setSyncStatus("ok");
    } catch {
      setSyncStatus("error");
    }
  }

  // ── NAME EDITING ───────────────────────────────────────────────
  function startEditName(side) {
    if (mode !== "control") return;
    document.getElementById(`name-${side}-display`).classList.add("hidden");
    const inp = document.getElementById(`name-${side}-edit`);
    inp.classList.remove("hidden");
    const input = document.getElementById(`name-${side}-input`);
    input.value = side === "a" ? state.teamA : state.teamB;
    input.focus();
  }

  function nameKeydown(e, side) {
    if (e.key === "Enter") saveName(side);
  }

  async function saveName(side) {
    const val = document.getElementById(`name-${side}-input`).value.trim() || (side === "a" ? "Team A" : "Team B");
    document.getElementById(`name-${side}-edit`).classList.add("hidden");
    document.getElementById(`name-${side}-display`).classList.remove("hidden");
    const s = { ...state, setHistory: [...state.setHistory] };
    if (side === "a") s.teamA = val; else s.teamB = val;
    await saveAndRender(s);
  }

  // ── MODE SETUP ─────────────────────────────────────────────────
  function chooseMode(m) {
    mode = m;
    document.getElementById("mode-screen").style.display = "none";
    document.getElementById("app").classList.add("visible");

    const isControl = m === "control";
    document.getElementById("controls-a").style.display = isControl ? "flex" : "none";
    document.getElementById("controls-b").style.display = isControl ? "flex" : "none";
    document.getElementById("btn-reset").style.display  = isControl ? "inline-block" : "none";
    document.getElementById("edit-hint-a").style.display = isControl ? "" : "none";
    document.getElementById("edit-hint-b").style.display = isControl ? "" : "none";
    if (!isControl) {
      document.getElementById("name-a-display").onclick = null;
      document.getElementById("name-b-display").onclick = null;
    }

    setSyncStatus("syncing");
    startPolling();
  }

  // ── POLLING ────────────────────────────────────────────────────
  function startPolling() {
    poll();
    pollTimer = setInterval(poll, 2000);
  }

  async function poll() {
    try {
      const remote = await fetchState();
      // Only update from remote if we're display mode, or if remote is newer
      if (mode === "display" || !state) {
        state = remote;
        render(state);
      }
      setSyncStatus("ok");
    } catch {
      setSyncStatus("error");
    }
  }
</script>
</body>
</html>
