<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Volleyball Scoreboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000000;
      --border: rgba(255,255,255,0.06);
      --text: #f8fafc;
      --muted: #475569;
      --dim: #1e293b;
      --green: #22c55e;
      --blue: #3b82f6;
      --amber: #f59e0b;
      --red: #ef4444;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    /* ── MODE SCREEN ── */
    #mode-screen {
      width: 100vw; height: 100vh;
      background: #000000;
      display: flex; align-items: center; justify-content: center;
    }
    .mode-card { text-align: center; width: min(90vw, 420px); }
    .mode-card .ball { font-size: clamp(48px, 12vw, 80px); margin-bottom: 2vh; }
    .mode-card h1 {
      font-size: clamp(20px, 5vw, 32px); font-weight: 900;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text); margin-bottom: 1vh;
    }
    .mode-card p { color: var(--muted); font-size: clamp(13px, 3vw, 16px); margin-bottom: 4vh; }
    .mode-buttons { display: flex; flex-direction: column; gap: 2vh; }
    .mode-btn {
      display: flex; flex-direction: column; align-items: center; gap: 0.5vh;
      padding: clamp(14px, 3vh, 24px);
      border-radius: 16px; border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer; background: none; color: inherit;
    }
    .mode-btn.display { background: rgba(30,64,175,0.13); }
    .mode-btn.control { background: rgba(146,64,14,0.13); }
    .mode-btn .icon  { font-size: clamp(28px, 7vw, 40px); }
    .mode-btn .label { font-size: clamp(16px, 4vw, 20px); font-weight: 700; }
    .mode-btn .desc  { font-size: clamp(11px, 2.5vw, 14px); color: var(--muted); }

    /* ── MAIN APP ── */
    #app {
      width: 100vw; height: 100vh;
      background: #000000;
      display: none; flex-direction: column;
    }
    #app.visible { display: flex; }

    /* Top bar */
    #topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2vh 3vw;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tb-title { font-size: clamp(11px, 2vw, 14px); font-weight: 800; letter-spacing: 0.15em; color: var(--muted); }
    .tb-badge {
      font-size: clamp(11px, 2vw, 13px); font-weight: 700; letter-spacing: 0.1em;
      padding: 0.3vh 1.2vw; border-radius: 20px;
    }
    .tb-badge.playing { color: var(--amber); background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); }
    .tb-badge.over    { color: var(--green); background: rgba(34,197,94,0.1);  border: 1px solid rgba(34,197,94,0.2); }
    #sync-dot {
      font-size: clamp(10px, 1.8vw, 12px); font-weight: 700;
      padding: 0.3vh 1.2vw; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* Score area */
    #score-area {
      flex: 1; display: flex; align-items: stretch; overflow: hidden;
      min-height: 0;
    }

    .team-col {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: space-evenly;
      padding: 1vh 1vw;
      transition: background 0.4s;
      min-width: 0;
    }
    .team-col.flash-green { background: rgba(34,197,94,0.07); }
    .team-col.flash-blue  { background: rgba(59,130,246,0.07); }

    .team-name {
      font-size: clamp(16px, 3.5vw, 26px); font-weight: 900;
      letter-spacing: 0.06em; color: #e2e8f0; text-transform: uppercase;
      display: flex; align-items: center; gap: 6px;
      flex-shrink: 0;
    }
    .edit-hint { font-size: 0.6em; color: var(--muted); font-weight: 400; }
    .team-name.editable { cursor: pointer; }

    .name-edit { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .name-input {
      background: var(--dim); border: 1px solid var(--blue); border-radius: 8px;
      color: var(--text); font-size: clamp(14px, 3vw, 18px);
      padding: 6px 10px; width: clamp(90px, 18vw, 150px); outline: none;
    }
    .name-save {
      background: var(--green); border: none; border-radius: 8px;
      color: #fff; font-size: 18px; padding: 6px 12px; cursor: pointer;
    }

    /* Score number — key rule: font-size scales with viewport */
    .score-num {
      font-size: min(42vw, 68vh);
      font-weight: 900;
      line-height: 1;
      color: var(--text);
      text-shadow: 0 0 60px rgba(255,255,255,0.08);
      transform: scaleX(0.8);
      transform-origin: center;
    }
    .score-num.alert {
      color: var(--red);
      text-shadow: 0 0 40px rgba(239,68,68,0.45);
    }

    /* Set number */
    .set-num {
      font-size: clamp(48px, 10vw, 100px);
      font-weight: 900;
      color: rgba(255,255,255,0.12);
      transition: color 0.3s, text-shadow 0.3s;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }
    .set-num.won-green { color: var(--green); text-shadow: 0 0 16px rgba(34,197,94,0.45); }
    .set-num.won-blue  { color: var(--blue);  text-shadow: 0 0 16px rgba(59,130,246,0.45); }

    /* Controls */
    .controls { display: flex; gap: 2vw; flex-shrink: 0; }
    .btn-minus, .btn-plus {
      width: clamp(52px, 11vw, 80px); height: clamp(52px, 11vw, 80px);
      border-radius: 50%; font-weight: 700; cursor: pointer;
      font-size: clamp(22px, 5vw, 38px);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s;
    }
    .btn-minus:active, .btn-plus:active { transform: scale(0.92); }
    .btn-minus {
      border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04);
      color: #94a3b8;
    }
    .btn-plus-a {
      border: none; background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff; box-shadow: 0 4px 20px rgba(34,197,94,0.35);
    }
    .btn-plus-b {
      border: none; background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff; box-shadow: 0 4px 20px rgba(59,130,246,0.35);
    }

    /* Divider */
    .divider {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 0 0.5vw; flex-shrink: 0;
    }
    .div-line { width: 1px; flex: 1; background: rgba(255,255,255,0.05); }
    .div-colon {
      font-size: clamp(24px, 5vw, 48px); font-weight: 900;
      color: var(--dim); line-height: 1; padding: 1vh 0;
    }

    /* Bottom bar */
    #bottombar {
      flex-shrink: 0; border-top: 1px solid var(--border);
      padding: 0.8vh 3vw; display: flex;
      align-items: center; justify-content: space-between; gap: 2vw;
    }
    #history { display: flex; gap: 2vw; align-items: center; flex-wrap: wrap; }
    .history-empty { font-size: clamp(10px, 2vw, 13px); color: #334155; }
    .history-set   { font-size: clamp(11px, 2.5vw, 15px); color: #64748b; }
    #winner-text   { font-size: clamp(11px, 2.5vw, 15px); color: var(--green); font-weight: 700; }

    #btn-reset {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; color: #94a3b8;
      font-size: clamp(11px, 2vw, 14px); font-weight: 600;
      padding: 0.5vh 1.5vw; cursor: pointer; white-space: nowrap;
      display: none;
    }

    #reset-row {
      display: none;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      padding: 0.8vh 3vw;
      justify-content: space-around;
      align-items: center;
      gap: 1vw;
    }
    .btn-reset-small {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; color: #94a3b8;
      font-size: clamp(10px, 1.8vw, 13px); font-weight: 600;
      padding: 0.5vh 1.2vw; cursor: pointer; white-space: nowrap;
    }
    .btn-reset-small:active { background: rgba(255,255,255,0.1); }
    .btn-reset-small.red   { color: #f87171; border-color: rgba(248,113,113,0.25); }
    .btn-reset-small.blue  { color: #60a5fa; border-color: rgba(96,165,250,0.25); }

    .hidden { display: none !important; }

    /* ── PIN SCREEN ── */
    #pin-screen {
      width: 100vw; height: 100vh;
      background: #000000;
      display: flex; align-items: center; justify-content: center;
    }
    .pin-card {
      text-align: center; width: min(90vw, 360px);
      display: flex; flex-direction: column; align-items: center; gap: 3vh;
    }
    .pin-card .ball { font-size: clamp(40px, 10vw, 64px); }
    .pin-card h2 {
      font-size: clamp(18px, 4vw, 26px); font-weight: 900;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--text);
    }
    .pin-dots {
      display: flex; gap: 1.5vw; justify-content: center;
    }
    .pin-dot {
      width: clamp(14px, 3vw, 20px); height: clamp(14px, 3vw, 20px);
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      transition: background 0.15s;
    }
    .pin-dot.filled { background: var(--text); }
    .pin-error { color: var(--red); font-size: clamp(12px, 2.5vw, 15px); font-weight: 600; min-height: 1.5em; }
    .pin-keypad {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: clamp(8px, 2vw, 14px); width: 100%;
    }
    .pin-key {
      aspect-ratio: 1;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font-size: clamp(20px, 5vw, 32px); font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, transform 0.1s;
    }
    .pin-key:active { background: rgba(255,255,255,0.18); transform: scale(0.93); }
    .pin-key.del { font-size: clamp(16px, 4vw, 24px); color: #94a3b8; }
    .pin-key.empty { border: none; background: none; cursor: default; }
  </style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <div class="pin-card">
    <div class="ball">🏐</div>
    <h2>PIN eingeben</h2>
    <div class="pin-dots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-error" id="pin-error"></div>
    <div class="pin-keypad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key empty"></button>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key del" onclick="pinDel()">⌫</button>
    </div>
  </div>
</div>

<!-- MODE SCREEN -->
<div id="mode-screen" style="display:none">
  <div class="mode-card">
    <div class="ball">🏐</div>
    <h1>Volleyball</h1>
    <p>Modus für dieses Gerät wählen</p>
    <div class="mode-buttons">
      <button class="mode-btn display" onclick="chooseMode('display')">
        <span class="icon">📺</span>
        <span class="label">Anzeigetafel</span>
        <span class="desc">Zeigt den Spielstand an</span>
      </button>
      <button class="mode-btn control" onclick="chooseMode('control')">
        <span class="icon">🎮</span>
        <span class="label">Steuerung</span>
        <span class="desc">Punkte eintragen &amp; verwalten</span>
      </button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">

  <div id="topbar">
    <span class="tb-title">🏐 VOLLEYBALL</span>
    <span id="set-badge" class="tb-badge playing">SATZ 1 / 3</span>
    <span id="sync-dot">●</span>
  </div>

  <div id="score-area">

    <!-- Team A -->
    <div class="team-col" id="col-a">
      <div class="score-num" id="score-a">0</div>
      <div class="set-num" id="sets-a">0</div>
      <div class="controls" id="controls-a" style="display:none">
        <button class="btn-minus" onclick="removePoint('a')">−</button>
        <button class="btn-plus btn-plus-a" onclick="addPoint('a')">+</button>
      </div>
    </div>

    <div class="divider">
      <div class="div-line"></div>
      <div class="div-colon">:</div>
      <div class="div-line"></div>
    </div>

    <!-- Team B -->
    <div class="team-col" id="col-b">
      <div class="score-num" id="score-b">0</div>
      <div class="set-num" id="sets-b">0</div>
      <div class="controls" id="controls-b" style="display:none">
        <button class="btn-minus" onclick="removePoint('b')">−</button>
        <button class="btn-plus btn-plus-b" onclick="addPoint('b')">+</button>
      </div>
    </div>

  </div>

  <div id="bottombar">
    <div id="history"><span class="history-empty">Noch kein Satz gespielt</span></div>
    <div style="display:flex;gap:2vw;align-items:center;flex-shrink:0">
      <button id="btn-reset" onclick="resetGame()">↺ Neu</button>
    </div>
  </div>

  <!-- Reset row (control mode only) -->
  <div id="reset-row">
    <button class="btn-reset-small red"  onclick="resetScore('a')">Punkte A: 0</button>
    <button class="btn-reset-small red"  onclick="resetSets('a')">Sätze A: 0</button>
    <button class="btn-reset-small blue" onclick="resetSets('b')">Sätze B: 0</button>
    <button class="btn-reset-small blue" onclick="resetScore('b')">Punkte B: 0</button>
  </div>

</div>

<script>
  const CORRECT_PIN = "1976";
  let pinEntry = "";

  function pinKey(digit) {
    if (pinEntry.length >= 4) return;
    pinEntry += digit;
    updatePinDots();
    if (pinEntry.length === 4) checkPin();
  }

  function pinDel() {
    pinEntry = pinEntry.slice(0, -1);
    updatePinDots();
    document.getElementById("pin-error").textContent = "";
  }

  function updatePinDots() {
    for (let i = 0; i < 4; i++) {
      document.getElementById("pd" + i).classList.toggle("filled", i < pinEntry.length);
    }
  }

  function checkPin() {
    if (pinEntry === CORRECT_PIN) {
      document.getElementById("pin-screen").style.display = "none";
      document.getElementById("mode-screen").style.display = "flex";
    } else {
      document.getElementById("pin-error").textContent = "Falscher PIN";
      pinEntry = "";
      updatePinDots();
    }
  }

  // Keyboard support for PIN
  document.addEventListener("keydown", (e) => {
    if (document.getElementById("pin-screen").style.display === "none") return;
    if (e.key >= "0" && e.key <= "9") pinKey(e.key);
    if (e.key === "Backspace") pinDel();
  });
  const BIN_ID  = "69fcbfa5250b1311c319c4d8";
  const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

  let mode = null;
  let state = null;

  const initialState = () => ({
    scoreA: 0, scoreB: 0,
    setsA: 0, setsB: 0,
    setHistory: [],
    gameOver: false, winner: null,
    teamA: "Team A", teamB: "Team B",
  });

  async function fetchState() {
    const res = await fetch(BIN_URL + "/latest", {
      headers: { "X-Master-Key": API_KEY, "X-Bin-Meta": "false" },
    });
    if (!res.ok) throw new Error(res.status);
    return res.json();
  }

  async function pushState(s) {
    const res = await fetch(BIN_URL, {
      method: "PUT",
      headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
      body: JSON.stringify(s),
    });
    if (!res.ok) throw new Error(res.status);
  }

  function setSyncStatus(st) {
    const el = document.getElementById("sync-dot");
    const map = {
      ok:      ["● LIVE",    "#22c55e", "rgba(34,197,94,0.1)",  "rgba(34,197,94,0.25)"],
      syncing: ["↻ SYNC",    "#f59e0b", "rgba(245,158,11,0.1)", "rgba(245,158,11,0.25)"],
      error:   ["✕ OFFLINE", "#ef4444", "rgba(239,68,68,0.1)",  "rgba(239,68,68,0.25)"],
    };
    const [text, color, bg, border] = map[st] || map.error;
    el.textContent = text;
    el.style.cssText = `color:${color};background:${bg};border:1px solid ${border};font-size:clamp(10px,1.8vw,12px);font-weight:700;letter-spacing:0.08em;padding:0.3vh 1.2vw;border-radius:20px`;
  }

  function render(s) {
    // Scores
    const elA = document.getElementById("score-a");
    const elB = document.getElementById("score-b");
    elA.textContent = s.scoreA;
    elB.textContent = s.scoreB;
    elA.classList.toggle("alert", s.scoreA === 10 || s.scoreA === 20);
    elB.classList.toggle("alert", s.scoreB === 10 || s.scoreB === 20);

    // Team names (elements may not exist)
    document.getElementById("name-a-text") && (document.getElementById("name-a-text").textContent = s.teamA);
    document.getElementById("name-b-text") && (document.getElementById("name-b-text").textContent = s.teamB);

    // Set numbers
    const sA = document.getElementById("sets-a");
    const sB = document.getElementById("sets-b");
    sA.textContent = s.setsA;
    sB.textContent = s.setsB;
    sA.className = "set-num" + (s.setsA > 0 ? " won-green" : "");
    sB.className = "set-num" + (s.setsB > 0 ? " won-blue"  : "");

    // Badge
    const badge = document.getElementById("set-badge");
    if (s.gameOver) {
      badge.textContent = "SPIEL BEENDET";
      badge.className = "tb-badge over";
    } else {
      badge.textContent = `SATZ ${s.setHistory.length + 1} / 3`;
      badge.className = "tb-badge playing";
    }

    // History
    const hist = document.getElementById("history");
    if (s.setHistory.length === 0) {
      hist.innerHTML = '<span class="history-empty">Noch kein Satz gespielt</span>';
    } else {
      hist.innerHTML = s.setHistory.map((h, i) => {
        const aW = h.a > h.b;
        return `<span class="history-set">S${i+1}: <span style="font-weight:700;color:${aW?'#22c55e':'#94a3b8'}">${h.a}</span><span style="color:#334155">–</span><span style="font-weight:700;color:${!aW?'#3b82f6':'#94a3b8'}">${h.b}</span></span>`;
      }).join("") + (s.gameOver ? ` <span id="winner-text">🏆 ${s.winner==="A"?s.teamA:s.teamB} gewinnt!</span>` : "");
    }
  }

  function flash(side) {
    const col = document.getElementById("col-" + side);
    const cls = side === "a" ? "flash-green" : "flash-blue";
    col.classList.add(cls);
    setTimeout(() => col.classList.remove(cls), 700);
  }

  function checkSetWin(a, b) {
    if ((a >= 25 || b >= 25) && Math.abs(a - b) >= 2) return a > b ? "A" : "B";
    return null;
  }

  async function addPoint(side) {
    if (!state || state.gameOver) return;
    const s = { ...state, setHistory: [...state.setHistory] };
    if (side === "a") s.scoreA++; else s.scoreB++;
    const winner = checkSetWin(s.scoreA, s.scoreB);
    if (winner) {
      flash(side);
      s.setHistory.push({ a: s.scoreA, b: s.scoreB });
      if (winner === "A") s.setsA++; else s.setsB++;
      if (s.setsA === 2 || s.setsB === 2) { s.gameOver = true; s.winner = winner; }
      else { s.scoreA = 0; s.scoreB = 0; }
    } else { flash(side); }
    await saveAndRender(s);
  }

  async function removePoint(side) {
    if (!state || state.gameOver) return;
    const s = { ...state, setHistory: [...state.setHistory] };
    if (side === "a") s.scoreA = Math.max(0, s.scoreA - 1);
    else              s.scoreB = Math.max(0, s.scoreB - 1);
    await saveAndRender(s);
  }

  async function resetGame() {
    const s = initialState();
    s.teamA = state ? state.teamA : "Team A";
    s.teamB = state ? state.teamB : "Team B";
    await saveAndRender(s);
  }

  async function resetScore(side) {
    const s = { ...state, setHistory: [...state.setHistory] };
    if (side === "a") s.scoreA = 0; else s.scoreB = 0;
    await saveAndRender(s);
  }

  async function resetSets(side) {
    const s = { ...state, setHistory: [...state.setHistory] };
    if (side === "a") { s.setsA = 0; } else { s.setsB = 0; }
    s.gameOver = false; s.winner = null;
    await saveAndRender(s);
  }

  async function saveAndRender(s) {
    state = s;
    render(s);
    setSyncStatus("syncing");
    try { await pushState(s); setSyncStatus("ok"); }
    catch { setSyncStatus("error"); }
  }

  function startEditName(side) {
    if (mode !== "control") return;
    document.getElementById(`name-${side}-display`).classList.add("hidden");
    document.getElementById(`name-${side}-edit`).classList.remove("hidden");
    const inp = document.getElementById(`name-${side}-input`);
    inp.value = side === "a" ? state.teamA : state.teamB;
    inp.focus();
  }

  function nameKeydown(e, side) { if (e.key === "Enter") saveName(side); }

  async function saveName(side) {
    const val = document.getElementById(`name-${side}-input`).value.trim()
      || (side === "a" ? "Team A" : "Team B");
    document.getElementById(`name-${side}-edit`).classList.add("hidden");
    document.getElementById(`name-${side}-display`).classList.remove("hidden");
    const s = { ...state, setHistory: [...state.setHistory] };
    if (side === "a") s.teamA = val; else s.teamB = val;
    await saveAndRender(s);
  }

  function chooseMode(m) {
    mode = m;
    document.getElementById("mode-screen").style.display = "none";
    document.getElementById("app").classList.add("visible");

    const isControl = m === "control";
    document.getElementById("controls-a").style.display = isControl ? "flex" : "none";
    document.getElementById("controls-b").style.display = isControl ? "flex" : "none";
    document.getElementById("btn-reset").style.display = isControl ? "inline-block" : "none";
    document.getElementById("reset-row").style.display = isControl ? "flex" : "none";
    document.getElementById("edit-hint-a") && (document.getElementById("edit-hint-a").style.display = isControl ? "" : "none");
    document.getElementById("edit-hint-b") && (document.getElementById("edit-hint-b").style.display = isControl ? "" : "none");
    if (!isControl) {
      document.getElementById("name-a-display") && (document.getElementById("name-a-display").onclick = null);
      document.getElementById("name-b-display") && (document.getElementById("name-b-display").onclick = null);
    }

    setSyncStatus("syncing");
    poll();
    setInterval(poll, 2000);
  }

  async function poll() {
    try {
      const remote = await fetchState();
      if (mode === "display" || !state) { state = remote; render(state); }
      setSyncStatus("ok");
    } catch { setSyncStatus("error"); }
  }
</script>
</body>
</html>
