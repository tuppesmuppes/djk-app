<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Volleyball Scoreboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #22c55e; --blue: #3b82f6; --amber: #f59e0b; --red: #ef4444;
      --muted: #475569; --dim: #1e293b; --border: rgba(255,255,255,0.07);
    }
    html, body {
      width: 100%; height: 100%;
      background: #000; color: #f8fafc;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden; user-select: none; -webkit-user-select: none;
      touch-action: manipulation;
    }

    /* ── MODE SCREEN ── */
    #mode-screen {
      width: 100vw; height: 100svh;
      background: #000; display: flex; align-items: center; justify-content: center;
    }
    .mode-card { text-align: center; width: min(90vw, 400px); }
    .mode-card .ball { font-size: clamp(44px,11vw,72px); margin-bottom: 2vh; }
    .mode-card h1 {
      font-size: clamp(18px,5vw,28px); font-weight: 900;
      letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 1vh;
    }
    .mode-card p { color: var(--muted); font-size: clamp(12px,3vw,15px); margin-bottom: 4vh; }
    .mode-buttons { display: flex; flex-direction: column; gap: 2vh; }
    .mode-btn {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: clamp(12px,3vh,20px); border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08); cursor: pointer; background: none; color: inherit;
    }
    .mode-btn.display { background: rgba(30,64,175,0.12); }
    .mode-btn.control { background: rgba(146,64,14,0.12); }
    .mode-btn .icon  { font-size: clamp(26px,6vw,36px); }
    .mode-btn .label { font-size: clamp(15px,4vw,19px); font-weight: 700; }
    .mode-btn .desc  { font-size: clamp(11px,2.5vw,13px); color: var(--muted); }

    /* ── MAIN APP ── */
    #app {
      width: 100vw; height: 100svh;
      background: #000; display: none; flex-direction: column;
    }
    #app.visible { display: flex; }

    /* Top bar — fixed height */
    #topbar {
      height: 50px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 4vw; border-bottom: 1px solid var(--border);
    }
    .tb-title { font-size: 12px; font-weight: 800; letter-spacing: 0.15em; color: var(--muted); }
    .tb-badge { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; padding: 4px 12px; border-radius: 20px; }
    .tb-badge.playing { color: var(--amber); background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); }
    .tb-badge.over    { color: var(--green); background: rgba(34,197,94,0.1);  border: 1px solid rgba(34,197,94,0.2); }
    #sync-dot { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }

    /* Reset bar — fixed height, only in control mode */
    #reset-bar {
      height: 46px; flex-shrink: 0;
      display: none; align-items: center; justify-content: space-around;
      padding: 0 3vw; gap: 2vw;
      border-bottom: 1px solid var(--border);
    }
    .btn-rs {
      flex: 1; height: 30px;
      border-radius: 7px; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05); cursor: pointer;
      font-size: 11px; font-weight: 600; white-space: nowrap;
    }
    .btn-rs:active { background: rgba(255,255,255,0.12); }
    .btn-rs.green { color: #4ade80; border-color: rgba(74,222,128,0.3); }
    .btn-rs.blue  { color: #60a5fa; border-color: rgba(96,165,250,0.3); }

    /* Score area — takes remaining space */
    #score-area {
      flex: 1; display: flex; align-items: stretch;
      overflow: hidden; min-height: 0;
    }
    .team-col {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: space-between;
      padding: 3vh 1vw 4vh; transition: background 0.4s; min-width: 0;
    }
    .team-col.flash-green { background: rgba(34,197,94,0.07); }
    .team-col.flash-blue  { background: rgba(59,130,246,0.07); }

    /* Score number fills available space */
    .score-num {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: min(40vw, 72svh);
      font-weight: 900; line-height: 1; color: #f8fafc;
      font-variant-numeric: tabular-nums;
      transform: scaleX(0.8); transform-origin: center;
      transition: color 0.2s;
    }
    .score-num.alert { color: var(--red); }

    .set-num {
      font-size: clamp(28px,6vw,60px); font-weight: 900; flex-shrink: 0;
      color: rgba(255,255,255,0.12);
      transition: color 0.3s, text-shadow 0.3s;
      font-variant-numeric: tabular-nums;
    }
    .set-num.won-green { color: var(--green); text-shadow: 0 0 14px rgba(34,197,94,0.4); }
    .set-num.won-blue  { color: var(--blue);  text-shadow: 0 0 14px rgba(59,130,246,0.4); }

    .controls { display: flex; gap: 4vw; flex-shrink: 0; }
    .btn-minus, .btn-plus {
      width: clamp(54px,12vw,76px); height: clamp(54px,12vw,76px);
      border-radius: 50%; font-weight: 700; cursor: pointer;
      font-size: clamp(24px,5.5vw,38px);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s;
    }
    .btn-minus:active, .btn-plus:active { transform: scale(0.92); }
    .btn-minus { border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05); color: #94a3b8; }
    .btn-plus-a { border: none; background: linear-gradient(135deg,#22c55e,#16a34a); color: #fff; box-shadow: 0 4px 18px rgba(34,197,94,0.35); }
    .btn-plus-b { border: none; background: linear-gradient(135deg,#3b82f6,#2563eb); color: #fff; box-shadow: 0 4px 18px rgba(59,130,246,0.35); }

    .divider {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 0 1vw; flex-shrink: 0;
    }
    .div-line { width: 1px; flex: 1; background: rgba(255,255,255,0.05); }
    .div-colon { font-size: clamp(40px,7vw,100px); font-weight: 900; color: #ffffff; padding: 1vh 0; }
  </style>
</head>
<body>

<div id="mode-screen">
  <div class="mode-card">
    <div class="ball">🏐</div>
    <h1>Volleyball</h1>
    <p>Modus für dieses Gerät wählen</p>
    <div class="mode-buttons">
      <button class="mode-btn display" onclick="chooseMode('display')">
        <span class="icon">📺</span>
        <span class="label">Anzeigetafel</span>
        <span class="desc">Zeigt den Spielstand an</span>
      </button>
      <button class="mode-btn control" onclick="chooseMode('control')">
        <span class="icon">🎮</span>
        <span class="label">Steuerung</span>
        <span class="desc">Punkte eintragen &amp; verwalten</span>
      </button>
    </div>
  </div>
</div>

<div id="app">
  <!-- Top bar -->
  <div id="topbar">
    <span class="tb-title">🏐 VOLLEYBALL</span>
    <span id="set-badge" class="tb-badge playing">SATZ 1 / 3</span>
    <div style="display:flex;align-items:center;gap:8px">
      <button id="btn-reset" onclick="resetGame()"
        style="display:none;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:7px;color:#94a3b8;font-size:12px;font-weight:600;padding:4px 10px;cursor:pointer;">
        ↺ Neu
      </button>
      <span id="sync-dot">●</span>
    </div>
  </div>

  <!-- Reset bar (control only) -->
  <div id="reset-bar">
    <button class="btn-rs green" onclick="resetScore('a')">Pkt A: 0</button>
    <button class="btn-rs green" onclick="resetSets('a')">Satz A: 0</button>
    <button class="btn-rs blue"  onclick="resetSets('b')">Satz B: 0</button>
    <button class="btn-rs blue"  onclick="resetScore('b')">Pkt B: 0</button>
  </div>

  <!-- Score area -->
  <div id="score-area">
    <div class="team-col" id="col-a">
      <div class="score-num" id="score-a">0</div>
      <div class="set-num"   id="sets-a">0</div>
      <div class="controls"  id="controls-a" style="display:none">
        <button class="btn-minus"         onclick="removePoint('a')">−</button>
        <button class="btn-plus btn-plus-a" onclick="addPoint('a')">+</button>
      </div>
    </div>
    <div class="divider">
      <div class="div-line"></div>
      <div class="div-colon">:</div>
      <div class="div-line"></div>
    </div>
    <div class="team-col" id="col-b">
      <div class="score-num" id="score-b">0</div>
      <div class="set-num"   id="sets-b">0</div>
      <div class="controls"  id="controls-b" style="display:none">
        <button class="btn-minus"         onclick="removePoint('b')">−</button>
        <button class="btn-plus btn-plus-b" onclick="addPoint('b')">+</button>
      </div>
    </div>
  </div>
</div>

<script>
  const SERVER_URL = "https://scoreboard-rzql.onrender.com";
  let mode = null, state = null;

  const initialState = () => ({
    scoreA:0, scoreB:0, setsA:0, setsB:0,
    setHistory:[], gameOver:false, winner:null,
  });

  async function fetchState() {
    const r = await fetch(SERVER_URL + "/state?t=" + Date.now(), { cache:"no-store" });
    if (!r.ok) throw new Error(r.status);
    return r.json();
  }
  async function pushState(s) {
    const r = await fetch(SERVER_URL + "/state", {
      method:"PUT", headers:{"Content-Type":"application/json"}, body:JSON.stringify(s),
    });
    if (!r.ok) throw new Error(r.status);
  }

  function setSyncStatus(st) {
    const el = document.getElementById("sync-dot");
    const m = {
      ok:      ["● LIVE",    "#22c55e","rgba(34,197,94,0.1)","rgba(34,197,94,0.3)"],
      syncing: ["↻ SYNC",    "#f59e0b","rgba(245,158,11,0.1)","rgba(245,158,11,0.3)"],
      error:   ["✕ OFFLINE","#ef4444","rgba(239,68,68,0.1)","rgba(239,68,68,0.3)"],
    };
    const [t,c,bg,bd] = m[st]||m.error;
    el.textContent = t;
    el.style.cssText = `color:${c};background:${bg};border:1px solid ${bd};font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:0.06em`;
  }

  function render(s) {
    const eA = document.getElementById("score-a");
    const eB = document.getElementById("score-b");
    eA.textContent = s.scoreA;
    eB.textContent = s.scoreB;
    eA.classList.toggle("alert", s.scoreA===10||s.scoreA===20);
    eB.classList.toggle("alert", s.scoreB===10||s.scoreB===20);
    const sA = document.getElementById("sets-a");
    const sB = document.getElementById("sets-b");
    sA.textContent = s.setsA;
    sB.textContent = s.setsB;
    sA.className = "set-num"+(s.setsA>0?" won-green":"");
    sB.className = "set-num"+(s.setsB>0?" won-blue":"");
    const badge = document.getElementById("set-badge");
    badge.textContent = s.gameOver ? "SPIEL BEENDET" : `SATZ ${s.setHistory.length+1} / 3`;
    badge.className   = "tb-badge "+(s.gameOver?"over":"playing");
  }

  function flash(side) {
    const col = document.getElementById("col-"+side);
    const cls = side==="a"?"flash-green":"flash-blue";
    col.classList.add(cls);
    setTimeout(()=>col.classList.remove(cls), 700);
  }

  function checkSetWin(a,b) {
    if ((a>=25||b>=25)&&Math.abs(a-b)>=2) return a>b?"A":"B";
    return null;
  }

  async function addPoint(side) {
    if (!state||state.gameOver) return;
    const s = {...state, setHistory:[...state.setHistory]};
    if (side==="a") s.scoreA++; else s.scoreB++;
    const w = checkSetWin(s.scoreA, s.scoreB);
    if (w) {
      flash(side);
      s.setHistory.push({a:s.scoreA, b:s.scoreB});
      if (w==="A") s.setsA++; else s.setsB++;
      if (s.setsA===2||s.setsB===2) { s.gameOver=true; s.winner=w; }
      else { s.scoreA=0; s.scoreB=0; }
    } else flash(side);
    await saveAndRender(s);
  }

  async function removePoint(side) {
    if (!state||state.gameOver) return;
    const s = {...state, setHistory:[...state.setHistory]};
    if (side==="a") s.scoreA=Math.max(0,s.scoreA-1);
    else            s.scoreB=Math.max(0,s.scoreB-1);
    await saveAndRender(s);
  }

  async function resetGame()       { await saveAndRender(initialState()); }
  async function resetScore(side)  {
    const s={...state,setHistory:[...state.setHistory]};
    if(side==="a") s.scoreA=0; else s.scoreB=0;
    await saveAndRender(s);
  }
  async function resetSets(side)   {
    const s={...state,setHistory:[...state.setHistory]};
    if(side==="a") s.setsA=0; else s.setsB=0;
    s.gameOver=false; s.winner=null;
    await saveAndRender(s);
  }

  async function saveAndRender(s) {
    state=s; render(s); setSyncStatus("syncing");
    try { await pushState(s); setSyncStatus("ok"); }
    catch { setSyncStatus("error"); }
  }

  function chooseMode(m) {
    mode=m;
    document.getElementById("mode-screen").style.display="none";
    document.getElementById("app").classList.add("visible");
    const ctrl = m==="control";
    document.getElementById("controls-a").style.display = ctrl?"flex":"none";
    document.getElementById("controls-b").style.display = ctrl?"flex":"none";
    document.getElementById("btn-reset").style.display  = ctrl?"inline-block":"none";
    document.getElementById("reset-bar").style.display  = ctrl?"flex":"none";
    setSyncStatus("syncing");
    poll();
    setInterval(poll, 2000);
  }

  async function poll() {
    try {
      const remote = await fetchState();
      if (mode==="display"||!state) { state=remote; render(state); }
      setSyncStatus("ok");
    } catch { setSyncStatus("error"); }
  }
</script>
</body>
</html>
